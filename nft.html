<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NFT Showcase</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      font-size: 20px;
    }
    h1 {
      color: #ff2e2e;
      font-size: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid gray;
      padding: 14px;
    }
    .card img {
      width: 100%;
      border: 1px solid gray;
    }
    .card p {
      margin: 10px 0;
    }
    .button {
      background-color: #ff2e2e;
      color: white;
      padding: 14px;
      border: 1px solid gray;
      text-align: center;
      text-decoration: none;
      font-size: 20px;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Assets Alert NFT Showcase</h1>
  <div class="grid">
    <div class="card">
      <img src="beta_tester_nft.png" alt="Beta Tester NFT" />
      <p><strong>Beta Tester NFT</strong><br>Cost: Free (sign-up only)</p>
      <a href="#" class="button">View Metadata</a>
    </div>
    <div class="card">
      <img src="skater_mouse.gif" alt="Skater Mouse NFT" />
      <p><strong>Skater Mouse NFT</strong><br>Cost: Free (Beta Testers Only)</p>
      <a href="#" class="button">View Metadata</a>
    </div>
    <div class="card">
      <img src="paid_nft.png" alt="Paid NFT" />
      <p><strong>Paid NFT</strong><br>Cost: 15 MATIC</p>
      <a href="#" class="button">View Metadata</a>
    </div>
    <div class="card">
      <img src="premium_nft.png" alt="Premium NFT" />
      <p><strong>Premium NFT</strong><br>Cost: 50 MATIC</p>
      <a href="#" class="button">View Metadata</a>
    </div>
  </div>
</body>
</html>
