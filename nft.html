<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NFT Showcase</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }
    h1 {
      text-align: center;
    }
    .nft-card {
      border: 1px solid gray;
      padding: 1rem;
      margin-bottom: 1.5rem;
      background-color: #1e1e1e;
    }
    .nft-title {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NFT Showcase</h1>
    <div class="nft-card"><div class="nft-title">Beta Tester NFT</div><p>Earned by signing up and testing the app.</p></div>
    <div class="nft-card"><div class="nft-title">Skater Mouse NFT</div><p>Exclusive NFT with animated skater mouse.</p></div>
    <div class="nft-card"><div class="nft-title">Paid NFT</div><p>Available via in-app purchase or promotion.</p></div>
    <div class="nft-card"><div class="nft-title">Premium NFT</div><p>High-value reward with special animation/sound.</p></div>
  </div>
</body>
</html>
