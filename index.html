
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assets Alert - Beta Tester Sign-Up</title>
  <style>
    body { background-color: #121212; color: white; font-family: Arial, sans-serif; font-size: 22px; }
    h1, h2 { color: red; text-align: center; }
    form { width: 80%%; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
    input { padding: 10px; font-size: 20px; border: 1px solid gray; border-radius: 6px; }
    button { background-color: red; color: white; padding: 12px; border: 2px solid gray; font-size: 22px; border-radius: 6px; cursor: pointer; }
    .note { text-align: center; margin-top: 20px; font-size: 18px; color: yellow; }
    .nav-buttons { display: flex; justify-content: center; gap: 30px; margin-top: 40px; }
  </style>
</head>
<body>

  <h1>Welcome to Assets Alert!</h1>
  <h2>Beta Tester Sign-Up</h2>

  <form id="betaForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <input type="text" id="wallet" placeholder="Wallet Address" required>
    <button type="submit">Submit</button>
  </form>

  <div class="note">* 1 free NFT for beta testers! *</div>

  <div class="nav-buttons">
    <button onclick="location.href='nft.html'">View NFT Showcase</button>
    <button onclick="location.href='admin.html'">Go to Admin</button>
  </div>

  <script>
    document.getElementById("betaForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const wallet = document.getElementById("wallet").value;
      const entry = { name, email, wallet };

      const existing = JSON.parse(localStorage.getItem("betaTesters") || "[]");
      existing.push(entry);
      localStorage.setItem("betaTesters", JSON.stringify(existing));

      alert("Thank you for signing up!");
      document.getElementById("betaForm").reset();
    });
  </script>

</body>
</html>
