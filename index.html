
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert - Beta Tester Signup</title>
</head>
<body>
  <h1>Welcome to Assets Alert!</h1>
  <p>This app provides real-time monitoring and alerts for Bitcoin, crypto, and stock prices.</p>

  <h2>Beta Tester Signup</h2>
  <form id="betaForm" action="https://assets-alert-server.onrender.com/submit-form" method="POST">
    <label for="name">Name:</label><br />
    <input type="text" id="name" name="name" required /><br />
    <label for="email">Email:</label><br />
    <input type="email" id="email" name="email" required /><br />
    <label for="wallet">Wallet Address:</label><br />
    <input type="text" id="wallet" name="wallet" required /><br /><br />
    <button type="submit">Submit</button>
  </form>

  <p>*1 free NFT for beta testers!</p>
</body>
</html>
