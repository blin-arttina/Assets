
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets Alert - Beta Tester Sign-Up</title>
  <style>
    body { background-color: #000; color: #fff; font-family: Arial, sans-serif; padding: 2rem; }
    input, button { font-size: 1.25rem; }
    .container { max-width: 600px; margin: 0 auto; }
    .form-section { margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Assets Alert Logo" style="max-width: 200px;">
    <h1>Welcome to Assets Alert</h1>
    <p>Real-time monitoring and alerts for Bitcoin, crypto, and stock prices.</p>

    <div class="form-section">
      <h2 class="text-2xl font-bold mb-2">Beta Tester Sign-Up</h2>
      <form id="betaForm" class="mb-6">
        <input type="text" id="name" placeholder="Name" required class="block w-full p-2 mb-2 border rounded bg-gray-900 text-white border-gray-600"><br>
        <input type="email" id="email" placeholder="Email" required class="block w-full p-2 mb-2 border rounded bg-gray-900 text-white border-gray-600"><br>
        <input type="text" id="wallet" placeholder="Wallet Address" required class="block w-full p-2 mb-4 border rounded bg-gray-900 text-white border-gray-600"><br>
        <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Submit</button>
      </form>
      <p id="formMessage" class="text-white"></p>
    </div>

    <div class="form-section">
      <p><strong>Download APK:</strong> <button disabled>Coming Soon</button></p>
    </div>

    <div class="form-section">
      <a href="nft.html"><button>NFT Showcase</button></a>
      <a href="admin.html"><button>Admin Page</button></a>
    </div>
  </div>

  <script>
    document.getElementById("betaForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const wallet = document.getElementById("wallet").value;

      const response = await fetch("/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, wallet })
      });

      const result = await response.json();
      const message = document.getElementById("formMessage");
      if (result.success) {
        message.textContent = "Thanks for signing up!";
        message.classList.add("text-green-400");
        document.getElementById("betaForm").reset();
      } else {
        message.textContent = "Error submitting form. Please try again.";
        message.classList.add("text-red-400");
      }
    });
  </script>
</body>
</html>
