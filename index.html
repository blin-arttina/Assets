<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert - Beta Tester Sign-Up</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 24px;
      padding: 20px;
    }
    .section {
      margin-bottom: 30px;
    }
    label, input, button {
      display: block;
      margin: 10px 0;
    }
    input {
      font-size: 20px;
      padding: 5px;
      width: 100%;
    }
    button {
      background-color: red;
      color: white;
      border: 1px solid gray;
      font-size: 20px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="section">
    <img src="logo.png" alt="Assets Alert Logo" style="max-width: 300px;" />
    <h1>Welcome to Assets Alert!</h1>
    <p>This app provides real-time price alerts and monitoring for Bitcoin, crypto, and stock assets.</p>
  </div>

  <div class="section">
    <h2>Beta Tester Sign-Up</h2>
    <form id="betaForm">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="wallet">Wallet Address</label>
      <input type="text" id="wallet" name="wallet" required />

      <button type="submit">Submit</button>
    </form>
    <p>*1 free NFT for beta testers!*</p>
  </div>

  <div class="section">
    <h2>Assets Alert APK</h2>
    <button disabled>Coming Soon</button>
  </div>

  <div class="section">
    <button onclick="window.location.href='nft.html'">NFT Showcase</button>
    <button onclick="window.location.href='admin.html'">Admin Page</button>
  </div>

  <script>
    document.getElementById('betaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const wallet = document.getElementById('wallet').value.trim();

      if (!name || !email || !wallet) {
        alert('Please fill out all fields.');
        return;
      }

      try {
        const res = await fetch('/submit-form', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ name, email, wallet }),
        });

        const result = await res.json();
        if (res.ok) {
          alert(result.message);
          document.getElementById('betaForm').reset();
        } else {
          alert(result.message || 'Something went wrong.');
        }
      } catch (err) {
        alert('Error submitting form.');
      }
    });
  </script>
</body>
</html>
