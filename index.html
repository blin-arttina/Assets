
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert</title>
  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; }
    .container { padding: 20px; max-width: 600px; margin: auto; }
    h1, h2 { color: #fff; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin: 5px 0; }
    button { background-color: red; color: white; padding: 10px 15px; border: none; cursor: pointer; }
    .btn-link { background-color: #222; padding: 10px 15px; margin-top: 10px; display: inline-block; text-decoration: none; color: white; border: 1px solid gray; }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets_alert_logo.png" alt="Assets Alert Logo" style="width: 100%; max-width: 200px;" />
    <h1>Welcome to Assets Alert</h1>
    <p>Real-time monitoring and alerts for Bitcoin, crypto, and stock.</p>

    <h2>Beta Tester Sign-Up</h2>
    <form action="https://secure-signup-server.onrender.com/submit" method="POST">
      <label for="name">Name:</label>
      <input type="text" name="name" required />
      <label for="email">Email:</label>
      <input type="email" name="email" required />
      <label for="wallet">Wallet Address:</label>
      <input type="text" name="wallet" required />
      <button type="submit">Submit</button>
    </form>

    <h2>Download APK</h2>
    <button disabled>Coming Soon</button>

    <br/><br/>
    <a class="btn-link" href="nft.html">NFT Showcase</a>
    <a class="btn-link" href="admin.html">Admin Dashboard</a>
  </div>
</body>
</html>
