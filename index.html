<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: sans-serif;
      font-size: 24px;
      padding: 20px;
      margin: 0;
    }
    h1, h2 {
      text-align: center;
    }
    img.logo {
      display: block;
      margin: 0 auto 20px;
      max-width: 150px;
    }
    .form-container {
      background-color: #111;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }
    input, button {
      font-size: 20px;
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: red;
      color: white;
      cursor: pointer;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
    }
    .footer img {
      max-width: 120px;
    }
    .button-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    .button-row a {
      background: red;
      padding: 12px 20px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="Assets Alert Logo" class="logo"/>
  <h1>Welcome to Assets Alert</h1>
  <p style="text-align:center;">Live screenshots and price alert features displayed above...</p>

  <div class="form-container">
    <h2>Beta Tester Sign-Up</h2>
    <form id="signup-form">
      <label>Name:</label>
      <input type="text" name="name" required />
      <label>Email:</label>
      <input type="email" name="email" required />
      <label>Wallet Address:</label>
      <input type="text" name="wallet" required />
      <button type="submit">Submit</button>
    </form>
    <p style="color: yellow; text-align:center;">*1 free NFT for beta testers!</p>
  </div>

  <div class="button-row">
    <a href="nft.html">Go to NFT Showcase</a>
    <a href="admin.html">Go to Admin Page</a>
  </div>

  <div class="footer">
    <img src="blind_art_logo.png" alt="Blind Art Logo" />
  </div>

  <script>
    const form = document.getElementById('signup-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = {
        name: form.name.value,
        email: form.email.value,
        wallet: form.wallet.value
      };
      const res = await fetch('https://secure-signup-server.onrender.com/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      if (res.ok) {
        alert('Sign-up successful! Check your email.');
        form.reset();
      } else {
        alert('Error submitting the form. Please try again later.');
      }
    });
  </script>
</body>
</html>
