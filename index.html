<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 20px;
    }
    header img {
      max-height: 100px;
    }
    .section {
      padding: 30px;
      text-align: center;
    }
    .nft-gallery, .app-screenshots {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }
    .nft-gallery img, .app-screenshots img {
      width: 150px;
      height: 150px;
      border: 3px solid #777;
      border-radius: 10px;
    }
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      max-width: 300px;
      margin: 0 auto;
    }
    input[type="text"], input[type="email"] {
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: #d62828;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #bb1e1e;
    }
    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="Assets Alert Logo" />
  </header>

  <section class="section">
    <h2>NFT Showcase</h2>
    <div class="nft-gallery">
      <img src="images/nft1.png" alt="NFT 1" />
      <img src="images/nft2.png" alt="NFT 2" />
      <img src="images/nft3.png" alt="NFT 3" />
      <img src="images/nft4.png" alt="NFT 4" />
    </div>
  </section>

  <section class="section">
    <h2>App Screenshots</h2>
    <div class="app-screenshots">
      <img src="images/app1.png" alt="App Screenshot 1" />
      <img src="images/app2.png" alt="App Screenshot 2" />
    </div>
  </section>

  <section class="section">
    <h2>Sign Up for Beta Access</h2>
    <form>
      <input type="text" name="name" placeholder="Name" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="text" name="wallet" placeholder="Wallet Address" required />
      <button type="submit">Sign Up</button>
    </form>
  </section>

  <section class="section">
    <h2>Support the Project</h2>
    <button onclick="alert('Crypto donation wallet will appear here.')">Donate</button>
  </section>

  <section class="section">
    <h2>Admin Dashboard</h2>
    <button onclick="alert('Admin login or WalletConnect goes here.')">Go to Admin Dashboard</button>
  </section>

  <footer>
    &copy; 2025 Assets Alert by Blind Art | All Rights Reserved
  </footer>

</body>
</html>
