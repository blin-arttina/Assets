
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert</title>
  <style>
    body { background-color: #111; color: white; font-size: 24px; font-family: sans-serif; padding: 20px; }
    input, button { font-size: 20px; margin: 10px 0; }
    .btn { background-color: red; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    .btn:hover { background-color: darkred; }
  </style>
</head>
<body>
  <h1>Assets Alert</h1>
  <p>Real-time alerts for Bitcoin, crypto, and stocks with customizable sounds and thresholds.</p>

  <h2>Beta Tester Sign-Up</h2>
  <form action="https://assets-alert-server.onrender.com/api/signup" method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" required><br>
    <label>Email:</label><br>
    <input type="email" name="email" required><br>
    <label>Wallet Address:</label><br>
    <input type="text" name="wallet" pattern="^0x[a-fA-F0-9]{40}$" title="Enter a valid Ethereum address" value="0xDEADBEEFDEADBEEFDEADBEEFDEADBEEFDEADBEEF" required><br>
    <button class="btn" type="submit">Sign Up</button>
  </form>
</body>
</html>
