<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Beta Tester Sign-Up</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    .form-box {
      background-color: #111;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-size: 1.1em;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 4px;
    }
    button {
      margin-top: 20px;
      background-color: red;
      color: white;
      padding: 10px 20px;
      border: none;
      font-size: 1em;
      border-radius: 4px;
      cursor: pointer;
    }
    .footer-links {
      margin-top: 30px;
    }
    .footer-links a {
      background: red;
      padding: 10px;
      margin-right: 10px;
      border-radius: 5px;
      color: white;
      text-decoration: none;
    }
    .message {
      margin-top: 15px;
      font-size: 1em;
      color: yellow;
    }
  </style>
</head>
<body>
  <h1>Welcome to Assets Alert</h1>
  <p>Real-time monitoring and alerts for Bitcoin, crypto, and stocks.</p>

  <div class="form-box">
    <h2>Beta Tester Sign-Up</h2>
    <form id="signupForm">
      <label for="name">Name:</label>
      <input type="text" id="name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" required />

      <label for="wallet">Wallet Address:</label>
      <input type="text" id="wallet" required />

      <button type="submit">Sign Up</button>
      <p class="message" id="responseMsg"></p>
    </form>
  </div>

  <div class="footer-links">
    <a href="nft.html">NFT Showcase</a>
    <a href="admin.html">Admin Page</a>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const wallet = document.getElementById('wallet').value;

      const res = await fetch("https://assets-alert-server.onrender.com/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, wallet }),
      });

      const msg = document.getElementById("responseMsg");
      if (res.ok) {
        msg.textContent = "Thank you for signing up!";
        msg.style.color = "lime";
      } else {
        msg.textContent = "Submission failed. Please try again.";
        msg.style.color = "orange";
      }
    });
  </script>
</body>
</html>
