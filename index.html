
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assets Alert - Beta Tester Sign-Up</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1, h2 {
      color: #f00;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    input {
      width: 300px;
      padding: 8px;
      font-size: 16px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #f00;
      color: white;
      border: none;
      cursor: pointer;
    }
    #formResponse {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Assets Alert</h1>
  <p>Welcome to Assets Alert — real-time monitoring and alerts for Bitcoin, cryptocurrency, and stock prices. Join as a beta tester and get a free NFT!</p>
  
  <h2>Beta Tester Sign-Up</h2>
  <form id="betaForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br>
    
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br>
    
    <label for="wallet">Wallet Address:</label>
    <input type="text" id="wallet" name="wallet" required><br>
    
    <button type="submit">Submit</button>
  </form>

  <p id="formResponse"></p>

  <script>
    document.getElementById('betaForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        wallet: document.getElementById('wallet').value,
      };
      try {
        const res = await fetch('/submit-form', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });
        const data = await res.json();
        document.getElementById('formResponse').textContent = data.message;
        document.getElementById('betaForm').reset();
      } catch (err) {
        document.getElementById('formResponse').textContent = 'There was an error submitting the form.';
      }
    });
  </script>
</body>
</html>
