
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets Alert App</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 2rem;
    }
    .button {
      background-color: red;
      color: white;
      padding: 0.75rem;
      font-size: 18px;
      border: none;
      cursor: pointer;
      margin-top: 1rem;
    }
    .form-section {
      margin-top: 2rem;
      padding: 1rem;
      border: 1px solid gray;
      border-radius: 10px;
    }
    .form-section input {
      background-color: black;
      color: white;
      border: 1px solid gray;
      padding: 0.5rem;
      width: 100%;
      margin-bottom: 1rem;
    }
    .form-section label {
      color: white;
      display: block;
      margin-bottom: 0.5rem;
    }
    .form-section p {
      color: yellow;
      font-size: 20px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <h1>Welcome to Assets Alert</h1>
  <p>Live screenshots and price alert features displayed above...</p>

  <section class="form-section">
    <h2>Beta Tester Sign-Up</h2>
    <form id="signup-form" action="https://secure-signup-server.onrender.com/signup" method="POST">
      <label>Name:
        <input type="text" name="name" required>
      </label>
      <label>Email:
        <input type="email" name="email" required>
      </label>
      <label>Wallet Address:
        <input type="text" name="wallet" required>
      </label>
      <button type="submit" class="button">Submit</button>
    </form>
    <p>*1 free NFT for beta testers!</p>
  </section>

</body>
</html>
