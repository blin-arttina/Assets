
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets Alert Beta Sign-Up</title>
</head>
<body style="background-color: #121212; color: white; font-size: 24px; font-family: sans-serif;">
  <img src="logo.png" alt="Assets Alert Logo" style="max-width: 200px; display: block; margin: 0 auto;" />
  <h1 style="text-align: center;">Welcome to Assets Alert</h1>
  <p style="text-align: center; max-width: 600px; margin: 0 auto;">Real-time monitoring and alerts for Bitcoin, cryptocurrency, and stock price movements. Set alerts, upload custom sounds, and track changes in a sleek dark interface.</p>
  
  <hr>
  
  <h2>Beta Tester Sign-Up</h2>
  <form action="https://assets-alert-server.onrender.com/api/signup" method="POST" style="max-width: 600px; margin: 0 auto;">
    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name" required style="width: 100%; padding: 10px;"><br><br>
    
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required style="width: 100%; padding: 10px;"><br><br>
    
    <label for="wallet">Wallet Address:</label><br>
    <input type="text" id="wallet" name="wallet" required style="width: 100%; padding: 10px;"><br><br>
    
    <button type="submit" style="padding: 10px 20px; background-color: red; color: white; border: none;">Submit</button>
  </form>

  <hr>

  <h2>Download the APK</h2>
  <button style="padding: 10px 20px; background-color: gray; color: white; border: none;">Coming Soon</button>

  <hr>

  <div style="text-align: center;">
    <button onclick="window.location.href='nft.html'" style="padding: 10px 20px; background-color: red; color: white; margin-right: 10px;">NFT Showcase</button>
    <button onclick="window.location.href='admin.html'" style="padding: 10px 20px; background-color: red; color: white;">Admin Page</button>
  </div>
</body>
</html>
