
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: sans-serif;
      padding: 20px;
      font-size: 1.2em;
    }
    input, select, button {
      margin: 10px 0;
      padding: 10px;
      font-size: 1em;
      color: white;
      background-color: #222;
      border: 1px solid gray;
      border-radius: 5px;
    }
    button {
      background-color: red;
      cursor: pointer;
    }
    .section {
      border: 1px solid gray;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>
  <div class="section">
    <p><strong>Wallet:</strong> <span id="walletAddress">Not connected</span></p>
    <button onclick="connectWallet()">Connect Wallet</button>
  </div>

  <div class="section">
    <h2>Mint NFT</h2>
    <select id="mintToken">
      <option value="1">Skater Mouse</option>
      <option value="2">Beta Tester</option>
      <option value="3">Paid NFT</option>
      <option value="4">Premium NFT</option>
      <option value="5">Mystery #1</option>
      <option value="6">Mystery #2</option>
    </select>
    <input id="mintQty" type="number" value="1" min="1" />
    <button onclick="mint()">Mint</button>
  </div>

  <div class="section">
    <h2>Airdrop NFT</h2>
    <input id="airdropAddr" placeholder="Wallet address" />
    <select id="airdropToken">
      <option value="1">Skater Mouse</option>
      <option value="2">Beta Tester</option>
      <option value="3">Paid NFT</option>
      <option value="4">Premium NFT</option>
      <option value="5">Mystery #1</option>
      <option value="6">Mystery #2</option>
    </select>
    <input id="airdropQty" type="number" value="1" min="1" />
    <button onclick="airdrop()">Send Airdrop</button>
  </div>

  <div class="section">
    <h2>Beta Testers</h2>
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSAMPLEURL/pubhtml?widget=true&amp;headers=false" width="100%" height="300"></iframe>
  </div>

  <script>
    const contractAddress = "0xCdb25eb86266cAA0C175144eF4FB241A2F79390E";
    const adminWallet = "0x6502663d6d6ce0496abC0e6D8B5d8E79F7160E2E".toLowerCase();

    const abi = [{{"inputs":[{{"internalType":"string","name":"_baseTokenURI","type":"string"}}],"stateMutability":"nonpayable","type":"constructor"},
    {{"anonymous":false,"inputs":[{{"indexed":true,"internalType":"address","name":"operator","type":"address"}},{{"indexed":true,"internalType":"address","name":"from","type":"address"}},{{"indexed":true,"internalType":"address","name":"to","type":"address"}},{{"indexed":false,"internalType":"uint256","name":"id","type":"uint256"}},{{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}}],"name":"TransferSingle","type":"event"},
    {{"inputs":[{{"internalType":"address","name":"to","type":"address"}},{{"internalType":"uint256","name":"id","type":"uint256"}},{{"internalType":"uint256","name":"amount","type":"uint256"}},{{"internalType":"bytes","name":"data","type":"bytes"}}],"name":"mint","outputs":[],"stateMutability":"nonpayable","type":"function"}}];

    let web3, contract, selectedAccount;

    async function connectWallet() {
      if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: "eth_requestAccounts" });
        const accounts = await web3.eth.getAccounts();
        selectedAccount = accounts[0];
        document.getElementById("walletAddress").innerText = selectedAccount;

        if (selectedAccount.toLowerCase() !== adminWallet) {
          alert("Unauthorized wallet! Access denied.");
          return;
        }

        contract = new web3.eth.Contract(abi, contractAddress);
        alert("Connected successfully!");
      } else {
        alert("Please install MetaMask or use Brave Wallet.");
      }
    }

    async function mint() {
      const tokenId = document.getElementById("mintToken").value;
      const quantity = document.getElementById("mintQty").value;

      await contract.methods.mint(selectedAccount, tokenId, quantity, "0x").send({ from: selectedAccount });
      alert(`Minted ${quantity} of token ID ${tokenId}`);
    }

    async function airdrop() {
      const addr = document.getElementById("airdropAddr").value;
      const tokenId = document.getElementById("airdropToken").value;
      const quantity = document.getElementById("airdropQty").value;

      await contract.methods.mint(addr, tokenId, quantity, "0x").send({ from: selectedAccount });
      alert(`Airdropped ${quantity} of token ID ${tokenId} to ${addr}`);
    }
  </script>
</body>
</html>
