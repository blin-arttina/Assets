<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Blind_Art — Admin Mint + Airdrop (Detailed Diagnostics)</title>
<style>
  :root{ --bg:#000; --fg:#fff; --muted:#cfcfcf; --card:#0b0b0b; --outline:#fff;
         --btn:#e11d48; --btnText:#fff; --ok:#22c55e; --err:#ef4444; --warn:#eab308; }
  *{ box-sizing:border-box }
  html,body{ background:var(--bg); color:var(--fg); font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif; font-size:26px; line-height:1.35 }
  .wrap{ max-width:1100px; margin:0 auto; padding:22px 16px 140px }
  h1{ margin:0 0 10px; font-size:1.3em }
  h2{ margin:10px 0; font-size:1.1em }
  .card{ background:var(--card); border:3px solid var(--outline); border-radius:16px; padding:16px; margin:14px 0; }
  label{ display:block; font-weight:800; margin:10px 0 6px; }
  input,select,textarea{ width:100%; padding:12px; background:#000; color:#fff; border:3px solid var(--outline); border-radius:12px; }
  textarea{ min-height:160px; font-family: ui-monospace, Menlo, Consolas, monospace; }
  .row{ display:flex; flex-wrap:wrap; gap:12px; }
  .col{ flex:1 1 320px; }
  button{ cursor:pointer; border:3px solid var(--outline); background:var(--btn); color:var(--btnText); padding:12px 18px; border-radius:14px; font-weight:900 }
  button.ghost{ background:transparent; color:var(--fg) }
  .mono{ font-family: ui-monospace, Menlo, Consolas, monospace; }
  pre{ background:#000; border:3px solid var(--outline); border-radius:12px; padding:12px; color:#9eff9e; white-space:pre-wrap; overflow:auto }
  .pill{ display:inline-flex; gap:10px; align-items:center; border:3px solid var(--outline); padding:8px 12px; border-radius:999px; margin:6px 8px 0 0; color:#fff }
  .dot{ width:14px; height:14px; border-radius:50%; background:#666; border:2px solid var(--outline) }
  .ok{ background:var(--ok) } .bad{ background:var(--err) } .warn{ background:var(--warn) }
  a{ color:#ff8da8 }
</style>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
</head>
<body>
<div class="wrap">
  <h1>Blind_Art — Admin Mint + Airdrop</h1>
  <div class="card">
    <div class="row">
      <div class="col"><button id="btnConnect">Connect Wallet</button></div>
      <div class="col">
        <label>RPC Endpoint</label>
        <select id="rpc">
          <option value="https://polygon-rpc.com">polygon-rpc.com</option>
          <option value="https://rpc.ankr.com/polygon">ankr</option>
          <option value="https://polygon.llamarpc.com">llama</option>
          <option value="https://1rpc.io/matic">1rpc</option>
        </select>
      </div>
    </div>
    <div style="margin-top:10px">
      <div class="pill"><span id="dotChain" class="dot"></span> Network: Polygon Mainnet (137)</div>
      <div class="pill"><span id="dotOwner" class="dot"></span> Owner match</div>
    </div>
    <div style="margin-top:8px">
      Connected: <span id="who" class="mono">—</span><br/>
      Owner: <span id="own" class="mono">—</span><br/>
      Contract: <a id="addrLink" class="mono" target="_blank" rel="noopener">—</a>
    </div>
  </div>

  <div class="card">
    <h2>Mint</h2>
    <div class="row">
      <div class="col">
        <label for="token">Token</label>
        <select id="token">
          <option value="1">A1 — Skater Mouse (Animated)</option>
          <option value="2">A2 — Beta Tester NFT</option>
          <option value="3">A3 — Paid NFT</option>
          <option value="4">A4 — Premium NFT</option>
          <option value="5">M1 — Mystery Mouse (3D Glasses)</option>
          <option value="6">M2 — Mystery Mouse 2 (Miner)</option>
          <option value="7">S1 — Rapper Mouse</option>
        </select>
      </div>
      <div class="col">
        <label for="qty">Quantity</label>
        <input id="qty" type="number" min="1" value="1"/>
      </div>
    </div>
    <label for="to">Recipient (leave empty to mint to your wallet)</label>
    <input id="to" placeholder="0x…"/>
    <div class="row">
      <div class="col">
        <label>Gas (optional)</label>
        <div class="row">
          <input id="maxFee" placeholder="maxFeePerGas (gwei)"/>
          <input id="maxPrio" placeholder="maxPriorityFeePerGas (gwei)"/>
        </div>
      </div>
      <div class="col">
        <label>Confirmations / Timeout</label>
        <div class="row">
          <input id="confBlocks" value="2" placeholder="required blocks"/>
          <input id="timeoutSec" value="300" placeholder="timeout seconds"/>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="btnMint">Mint</button>
      <button id="btnSpeed" class="ghost">Speed Up</button>
      <button id="btnCancel" class="ghost">Cancel Pending</button>
    </div>
    <div id="status" class="mono" style="margin-top:8px">—</div>
  </div>

  <div class="card">
    <h2>Airdrop</h2>
    <label>Addresses (one per line). Optional qty: <span class="mono">0xabc… 3</span></label>
    <textarea id="airList" placeholder="0x1234...abcd&#10;0x5678...ef90 2"></textarea>
    <div class="row" style="margin-top:8px">
      <button id="btnAirdrop">Start Airdrop</button>
      <button id="btnStop" class="ghost">Stop</button>
    </div>
    <pre id="airLog">—</pre>
  </div>

  <div class="card">
    <h2>Diagnostics (detailed)</h2>
    <pre id="diag" aria-live="polite" aria-atomic="false">Ready.</pre>
  </div>
</div>

<script>
// ===== CONFIG =====
const CONTRACT = "0xCdb25eb86266cAA0C175144eF4FB241A2F79390E";
const ABI = [
  {"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"id","type":"uint256"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"bytes","name":"data","type":"bytes"}],"name":"mint","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256[]","name":"ids","type":"uint256[]"},{"internalType":"uint256[]","name":"amounts","type":"uint256[]"}],"name":"mintBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"}
];
document.getElementById("addrLink").href = "https://polygonscan.com/address/" + CONTRACT;
document.getElementById("addrLink").textContent = CONTRACT;
// ==================

let web3, provider, accounts=[], contract, ownerAddress, lastNonce=null;
let stopAir=false;

const $ = (id)=>document.getElementById(id);
const diag = $("diag");
function ts(){ const d=new Date(); return d.toLocaleTimeString(); }
function log(line){ diag.textContent += "\\n[" + ts() + "] " + line; diag.scrollTop = diag.scrollHeight; }
function setDot(id, ok){ const el=$(id); el.className = "dot " + (ok? "ok":"bad"); }
function setStatus(s){ $("status").textContent = s; log(s); }

function gwei(n){ return Web3.utils.toWei(String(n), "gwei"); }
function gasObj(){
  const fee = $("maxFee").value.trim();
  const prio = $("maxPrio").value.trim();
  const g = {};
  if (fee) g.maxFeePerGas = gwei(fee);
  if (prio) g.maxPriorityFeePerGas = gwei(prio);
  return g;
}

function errText(e){
  try{
    if (typeof e === "string") return e;
    if (e?.data?.message) return e.data.message;
    if (e?.error?.message) return e.error.message;
    if (e?.message) return e.message;
    return JSON.stringify(e);
  }catch(_){ return "Unknown error"; }
}

async function ensurePolygon(){
  try{
    await provider.request({ method:"wallet_switchEthereumChain", params:[{ chainId:"0x89" }] });
    setDot("dotChain", true);
    log("Network OK: Polygon Mainnet (137).");
  }catch(e){
    setDot("dotChain", false);
    log("⚠️ Failed to switch to Polygon: " + errText(e));
  }
}

async function connect(){
  try{
    const rpc = $("rpc").value;
    log("Connecting via RPC: " + rpc);
    if (window.ethereum){
      provider = window.ethereum;
      web3 = new Web3(provider);
      await provider.request({ method:"eth_requestAccounts" });
    } else {
      // Fallback to WalletConnect if no injected provider
      const wc = new WalletConnectProvider.default({ rpc:{ 137: rpc }, chainId:137 });
      await wc.enable();
      provider = wc;
      web3 = new Web3(provider);
    }
    await ensurePolygon();
    accounts = await web3.eth.getAccounts();
    $("who").textContent = accounts[0] || "(no wallet account)";
    contract = new web3.eth.Contract(ABI, CONTRACT);
    ownerAddress = await contract.methods.owner().call();
    $("own").textContent = ownerAddress;
    setDot("dotOwner", accounts[0] && ownerAddress && accounts[0].toLowerCase()===ownerAddress.toLowerCase());
    log("Connected wallet: " + (accounts[0] || "—"));
    log("Contract owner: " + ownerAddress);
    if (!(accounts[0] && ownerAddress && accounts[0].toLowerCase()===ownerAddress.toLowerCase())){
      log("⚠️ Wallet is NOT owner. Mint functions will revert with 'caller is not the owner'.");
    } else {
      log("✅ Wallet matches owner. Mint is allowed.");
    }
  }catch(e){
    setStatus("Connect error: " + errText(e));
  }
}

async function waitForReceipt(txHash, timeoutSec=300, confBlocks=2){
  const start = Date.now();
  log("Waiting for receipt: " + txHash);
  while ((Date.now() - start)/1000 < timeoutSec){
    const rec = await web3.eth.getTransactionReceipt(txHash);
    if (rec && rec.blockNumber){
      const current = await web3.eth.getBlockNumber();
      const conf = current - rec.blockNumber;
      log("Confirmations: " + conf + " / " + confBlocks);
      if (conf >= confBlocks) return rec;
    }
    await new Promise(r=>setTimeout(r, 4000));
  }
  throw new Error("Timed out waiting for confirmations");
}

async function doMint(){
  try{
    if (!accounts || !accounts[0]) return setStatus("Please connect your wallet first.");
    const to = $("to").value.trim() || accounts[0];
    const id = parseInt($("token").value);
    const qty = Math.max(1, parseInt($("qty").value||"1"));
    const gas = gasObj();
    const nonce = await web3.eth.getTransactionCount(accounts[0], "pending");
    lastNonce = nonce;
    setStatus("Submitting mint (id="+id+", qty="+qty+", to="+to+") with nonce "+nonce+"…");
    const send = contract.methods.mint(to, id, qty, "0x").send({ from: accounts[0], nonce, ...gas });
    let txHash = "";
    send.on("transactionHash", h=>{ txHash = h; setStatus("Tx sent: "+h+" — opening in Polygonscan…"); window.open("https://polygonscan.com/tx/"+h, "_blank"); });
    send.on("receipt", r=>{ setStatus("Mined in block "+r.blockNumber); });
    send.on("error", e=>{ setStatus("❌ Broadcast error: " + errText(e)); });
    const receipt = await send;
    const rec2 = await waitForReceipt(receipt.transactionHash, parseInt($("timeoutSec").value||"300"), parseInt($("confBlocks").value||"2"));
    setStatus("✅ Confirmed. Block " + rec2.blockNumber);
  }catch(e){
    setStatus("❌ Mint failed: " + errText(e));
  }
}

async function speedUp(){
  try{
    if (lastNonce==null) return setStatus("No pending tx to speed up.");
    const to = $("to").value.trim() || accounts[0];
    const id = parseInt($("token").value);
    const qty = Math.max(1, parseInt($("qty").value||"1"));
    const g = gasObj();
    // bump by 20% if provided
    if (g.maxFeePerGas) g.maxFeePerGas = Web3.utils.toBN(g.maxFeePerGas).muln(12).divn(10).toString();
    if (g.maxPriorityFeePerGas) g.maxPriorityFeePerGas = Web3.utils.toBN(g.maxPriorityFeePerGas).muln(12).divn(10).toString();
    setStatus("Speeding up with nonce "+lastNonce+"…");
    await contract.methods.mint(to, id, qty, "0x").send({ from: accounts[0], nonce: lastNonce, ...g })
      .on("transactionHash", h=>{ setStatus("Speed-up tx: "+h); window.open("https://polygonscan.com/tx/"+h, "_blank"); });
  }catch(e){
    setStatus("Speed-up failed: " + errText(e));
  }
}

async function cancelPending(){
  try{
    if (lastNonce==null) return setStatus("No pending tx to cancel.");
    const g = gasObj();
    const toSelf = accounts[0];
    setStatus("Sending 0-value cancel with nonce "+lastNonce+"…");
    await web3.eth.sendTransaction({ from: accounts[0], to: toSelf, value: "0", nonce: lastNonce, ...g })
      .on("transactionHash", h=>{ setStatus("Cancel tx: "+h); window.open("https://polygonscan.com/tx/"+h, "_blank"); });
  }catch(e){
    setStatus("Cancel failed: " + errText(e));
  }
}

// ===== Airdrop =====
function parseAir(){
  const raw = $("airList").value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  return raw.map(line=>{ const p=line.split(/\s+/); return { addr:p[0], qty: p[1]?parseInt(p[1],10):1 }; });
}
async function airdrop(){
  if (!accounts||!accounts[0]) return log("Connect wallet first.");
  stopAir = false;
  const id = parseInt($("token").value);
  const list = parseAir();
  const airLog = $("airLog");
  airLog.textContent = "Airdropping token "+id+" to "+list.length+" address(es)…";
  for (let i=0;i<list.length;i++){
    if (stopAir){ airLog.textContent += "\n⛔ Stopped."; break; }
    const {addr, qty} = list[i];
    try{
      const g = gasObj();
      const tx = await contract.methods.mintBatch(addr, [id], [qty]).send({ from: accounts[0], ...g })
        .on("transactionHash", h=>{ airLog.textContent += `\n#${i+1} tx: https://polygonscan.com/tx/${h}`; });
      airLog.textContent += `\n#${i+1} ✅ done (block ${tx.blockNumber})`;
    }catch(e){
      airLog.textContent += `\n#${i+1} ❌ ${errText(e)}`;
    }
    airLog.scrollTop = airLog.scrollHeight;
  }
}

$("btnConnect").onclick = connect;
$("btnMint").onclick = doMint;
$("btnSpeed").onclick = speedUp;
$("btnCancel").onclick = cancelPending;
$("btnAirdrop").onclick = airdrop;
$("btnStop").onclick = ()=>{ stopAir=true; };
</script>
</body>
</html>
