<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets Alert Admin Dashboard</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      border: 1px solid #444;
    }
    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }
    button {
      background-color: #d32f2f;
      color: white;
      border: 1px solid gray;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      margin-right: 1rem;
      margin-top: 1rem;
    }
    input, select {
      margin: 0.5rem 0;
      padding: 0.5rem;
      width: 100%;
      background-color: #222;
      color: white;
      border: 1px solid #555;
    }
    .nav {
      text-align: right;
      margin-bottom: 1rem;
    }
    a {
      color: white;
      text-decoration: none;
      margin-left: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="nft.html">NFT Showcase</a>
    </div>
    <h1>Admin Dashboard</h1>
    <p><strong>Mint NFTs:</strong></p>
    <input type="text" id="nftId" placeholder="Enter NFT ID (e.g., 1)" />
    <input type="number" id="quantity" placeholder="Enter quantity (e.g., 5)" />
    <button onclick="mintNFT()">Mint</button>

    <p><strong>Airdrop NFT:</strong></p>
    <input type="text" id="airdropAddress" placeholder="Enter Wallet Address" />
    <input type="text" id="airdropId" placeholder="Enter NFT ID" />
    <button onclick="airdropNFT()">Airdrop</button>

    <p><strong>Download Tester List:</strong></p>
    <button onclick="downloadTesters()">Download Tester List</button>
  </div>

  <script>
    function mintNFT() {
      const nftId = document.getElementById('nftId').value;
      const quantity = document.getElementById('quantity').value;
      alert(`Minting ${quantity} of NFT ID ${nftId}`);
      // Add actual Web3 mint code here
    }

    function airdropNFT() {
      const address = document.getElementById('airdropAddress').value;
      const nftId = document.getElementById('airdropId').value;
      alert(`Airdropping NFT ID ${nftId} to ${address}`);
      // Add actual Web3 airdrop code here
    }

    function downloadTesters() {
      const dummyData = "Name,Email,Wallet\nTester One,test1@example.com,0x123\nTester Two,test2@example.com,0x456";
      const blob = new Blob([dummyData], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'testers.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>
</body>
</html>
