<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 1.2em;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 2rem;
      border: 1px solid #444;
    }
    input, button, select {
      font-size: 1em;
      margin-top: 0.75rem;
      padding: 0.5rem;
      width: 100%;
      background-color: #222;
      color: white;
      border: 1px solid gray;
    }
    button {
      background-color: #d32f2f;
      cursor: pointer;
    }
    h1 {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Assets Alert Admin</h1>
    <p><strong>Connected Wallet:</strong> <span id="walletAddress">Not Connected</span></p>
    <button onclick="connectWallet()">Connect Wallet</button>

    <div id="adminPanel" style="display:none;">
      <h2>Mint NFT</h2>
      <select id="nftId">
        <option value="1">Skater Mouse</option>
        <option value="2">Beta Tester</option>
        <option value="3">Paid NFT</option>
        <option value="4">Premium NFT</option>
        <option value="5">Mystery NFT 1</option>
        <option value="6">Mystery NFT 2</option>
      </select>
      <input type="number" id="quantity" placeholder="Quantity"/>
      <button onclick="mintNFT()">Mint</button>

      <h2>Airdrop NFT</h2>
      <input type="text" id="airdropAddress" placeholder="Recipient Address"/>
      <select id="airdropId">
        <option value="1">Skater Mouse</option>
        <option value="2">Beta Tester</option>
        <option value="3">Paid NFT</option>
        <option value="4">Premium NFT</option>
        <option value="5">Mystery NFT 1</option>
        <option value="6">Mystery NFT 2</option>
      </select>
      <button onclick="airdropNFT()">Airdrop</button>

      <h2>Download Beta Tester List</h2>
      <button onclick="downloadTesters()">Download CSV</button>
    </div>
  </div>

<script>
let web3;
let accounts;
const adminAddress = "0x6502663d6d6ce0496abC0e6D8B5d8E79F7160E2E".toLowerCase();

async function connectWallet() {
  const provider = new WalletConnectProvider.default({
    rpc: {
      137: "https://polygon-rpc.com"
    },
    chainId: 137
  });
  await provider.enable();
  web3 = new Web3(provider);
  accounts = await web3.eth.getAccounts();
  const user = accounts[0];
  document.getElementById("walletAddress").innerText = user;

  if (user.toLowerCase() === adminAddress) {
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Unauthorized wallet address.");
  }
}

function mintNFT() {
  const id = document.getElementById("nftId").value;
  const qty = document.getElementById("quantity").value;
  alert(`Minting ${qty} of NFT ID ${id}`);
}

function airdropNFT() {
  const address = document.getElementById("airdropAddress").value;
  const id = document.getElementById("airdropId").value;
  alert(`Airdropping NFT ID ${id} to ${address}`);
}

function downloadTesters() {
  const csv = "Name,Email,Wallet\nTester1,test1@example.com,0x123...\nTester2,test2@example.com,0x456...";
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'testers.csv';
  a.click();
}
</script>
</body>
</html>
