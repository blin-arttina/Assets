<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets Alert Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }
    #status {
      margin: 20px 0;
      font-size: 18px;
    }
    button {
      background-color: #d22;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
    }
    button:hover {
      background-color: #a11;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin</h1>
  <div id="status">Connected Wallet: <span id="walletAddress">Not Connected</span></div>
  <button id="connectButton">Connect Wallet</button>  <script>
    const adminAddress = "0x6502663d6d6ce0496abC0e6D8B5d8E79F7160E2E";
    let web3;

    async function connectWallet() {
      if (typeof window.ethereum !== 'undefined') {
        try {
          await window.ethereum.request({ method: 'eth_requestAccounts' });
          web3 = new Web3(window.ethereum);
          const accounts = await web3.eth.getAccounts();
          const address = accounts[0];
          document.getElementById("walletAddress").innerText = address;

          if (address.toLowerCase() !== adminAddress.toLowerCase()) {
            alert("This wallet is not authorized as an admin.");
          }

        } catch (err) {
          alert("Wallet connection failed: " + err.message);
        }
      } else {
        alert("Ethereum wallet not detected. Please use Coinbase Wallet or MetaMask.");
      }
    }

    document.getElementById("connectButton").addEventListener("click", connectWallet);

    // Automatically connect on page load
    window.onload = () => {
      document.getElementById("connectButton").click();
    };
  </script></body>
</html>
