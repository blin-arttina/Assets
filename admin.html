
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assets Alert Admin Dashboard</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
    }
    h1, h2 {
      color: #ff4444;
    }
    .section {
      margin: 20px;
    }
    button {
      background-color: #cc0000;
      color: white;
      border: 2px solid #888;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
    select, input[type="text"], input[type="number"] {
      font-size: 18px;
      width: 300px;
      padding: 10px;
      margin: 10px 0;
    }
    .button-large {
      width: 320px;
    }
    .gray-outline {
      border: 2px solid gray;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
</head>
<body>
  <div class="section">
    <h1>Assets Alert Admin Dashboard</h1>
    <div>
      <strong>Wallet Connected:</strong> <span id="walletAddress">Not connected</span>
      <br><br>
      <button onclick="connectWallet()">Connect Wallet</button>
    </div>
  </div>

  <div class="section">
    <h2>Mint NFT</h2>
    <select id="mintNFTSelect">
      <option value="0">Skater Mouse NFT</option>
      <option value="1">Beta Tester NFT</option>
      <option value="2">Paid NFT</option>
      <option value="3">Premium NFT</option>
      <option value="4">Mystery NFT #1</option>
      <option value="5">Mystery NFT #2</option>
    </select><br>
    <input type="number" id="mintQuantity" placeholder="Quantity" class="gray-outline"><br>
    <button onclick="mintNFT()">Mint NFT</button>
  </div>

  <div class="section">
    <h2>Airdrop NFT</h2>
    <input type="text" id="airdropAddress" placeholder="Recipient Address" class="gray-outline"><br>
    <select id="airdropNFTSelect">
      <option value="0">Skater Mouse NFT</option>
      <option value="1">Beta Tester NFT</option>
      <option value="2">Paid NFT</option>
      <option value="3">Premium NFT</option>
      <option value="4">Mystery NFT #1</option>
      <option value="5">Mystery NFT #2</option>
    </select><br>
    <input type="number" id="airdropQuantity" placeholder="Quantity" class="gray-outline"><br>
    <button onclick="airdropNFT()">Airdrop NFT</button>
  </div>

  <div class="section">
    <h2>Beta Tester List</h2>
    <button onclick="downloadCSV()">Download Beta Tester CSV</button>
  </div>

  <script>
    let web3;

    async function connectWallet() {
      if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          document.getElementById("walletAddress").textContent = accounts[0];
        } catch (error) {
          alert("Connection denied.");
        }
      } else {
        alert("Brave or MetaMask not found.");
      }
    }

    function mintNFT() {
      alert("Minting logic would be implemented here.");
    }

    function airdropNFT() {
      alert("Airdrop logic would be implemented here.");
    }

    function downloadCSV() {
      const csvContent = "data:text/csv;charset=utf-8,Name,Email,Wallet Address
Test User,test@example.com,0x123...";
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "beta_testers.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
