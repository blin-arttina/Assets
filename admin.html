
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      font-size: 2em;
    }
    .container {
      background-color: #222;
      border: 1px solid gray;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }
    button {
      background-color: #c00;
      border: none;
      color: white;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid gray;
      background-color: #333;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Assets Alert Admin</h1>
    <p><strong>Connected Wallet:</strong> <span id="walletAddress">Not Connected</span></p>
    <button onclick="connectWallet()">Connect Wallet</button>

    <h2>Mint NFT</h2>
    <form id="mintForm" onsubmit="mintNFT(event)">
      <label for="nftType">Select NFT Type</label>
      <select id="nftType">
        <option value="1">Beta Tester NFT</option>
        <option value="2">Paid NFT</option>
        <option value="3">Premium NFT</option>
        <option value="4">Mystery NFT #1</option>
        <option value="5">Mystery NFT #2</option>
        <option value="6">Skater Mouse NFT</option>
      </select>
      <input type="text" id="recipient" placeholder="Recipient Wallet Address (optional)" />
      <button type="submit">Mint</button>
    </form>
  </div>

  <script>
    let userWalletAddress = "";

    async function connectWallet() {
      if (window.ethereum) {
        try {
          const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
          userWalletAddress = accounts[0];
          document.getElementById("walletAddress").innerText = userWalletAddress;
        } catch (error) {
          console.error("User rejected wallet connection");
        }
      } else {
        alert("MetaMask not found. Please install it to use this site.");
      }
    }

    async function mintNFT(event) {
      event.preventDefault();
      const type = parseInt(document.getElementById("nftType").value);
      let recipient = document.getElementById("recipient").value.trim();

      if (!recipient) recipient = userWalletAddress;

      if (!recipient) {
        alert("No recipient wallet found. Please connect your wallet or provide a recipient address.");
        return;
      }

      // Mint function call placeholder
      alert(`Minting NFT type ${type} to ${recipient}`);
    }
  </script>
</body>
</html>
