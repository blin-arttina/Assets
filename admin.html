<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assets Alert Admin</title>
  <script src="https://unpkg.com/web3@1.8.2/dist/web3.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }
    #status {
      margin: 20px 0;
      font-size: 18px;
    }
    button {
      background-color: #d22;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
    }
    button:hover {
      background-color: #a11;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin</h1>
  <div id="status">Connected Wallet: <span id="walletAddress">Not Connected</span></div>
  <button id="connectButton">Connect Wallet</button>  <script>
    let web3;
    let provider;
    const adminAddress = "0x6502663d6d6ce0496abC0e6D8B5d8E79F7160E2E";

    async function connectWallet() {
      provider = new WalletConnectProvider.default({
        rpc: {
          137: "https://polygon-rpc.com"
        },
        chainId: 137
      });

      provider.connector.on("display_uri", (err, payload) => {
        const uri = payload.params[0];
        const encoded = encodeURIComponent(uri);
        const deepLink = `https://link.trustwallet.com/wc?uri=${encoded}`;

        if (/android|iphone|ipad|ipod/i.test(navigator.userAgent)) {
          window.location.href = deepLink;
        } else {
          alert("Scan this QR with Trust Wallet:\n" + uri);
        }
      });

      try {
        await provider.enable();
        web3 = new Web3(provider);

        const accounts = await web3.eth.getAccounts();
        const address = accounts[0];
        document.getElementById("walletAddress").innerText = address;
      } catch (err) {
        alert("Connection failed: " + err.message);
      }
    }

    document.getElementById("connectButton").addEventListener("click", connectWallet);

    window.onload = () => {
      setTimeout(() => document.getElementById("connectButton").click(), 500);
    };
  </script></body>
</html>
