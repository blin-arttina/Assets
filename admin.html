<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets Alert Admin – Final Mint Build</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      background-color: #111;
      color: white;
      font-size: 20px;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: red;
    }
    button, select, input {
      background-color: black;
      color: white;
      border: 2px solid gray;
      padding: 10px;
      font-size: 18px;
      margin: 5px 0;
      width: 100%;
    }
    .section {
      margin-bottom: 40px;
    }
    #log {
      white-space: pre-wrap;
      background-color: #222;
      border: 1px solid gray;
      padding: 10px;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin</h1>
  <p>Wallet Connected: <span id="walletAddress">Not connected</span></p>
  <button onclick="connectWallet()">Connect Wallet</button>  <div class="section">
    <h2 style="color: red;">Mint NFT</h2>
    <select id="mintType">
      <option value="1">Skater Mouse NFT</option>
      <option value="0">Beta Tester NFT</option>
    </select>
    <input type="number" id="mintAmount" placeholder="Enter quantity" value="1" />
    <button onclick="mintNFT()">Mint NFT</button>
  </div>  <div class="section">
    <h2 style="color: red;">Airdrop NFT</h2>
    <input type="text" id="airdropWallet" placeholder="Recipient Wallet Address" />
    <select id="airdropType">
      <option value="1">Skater Mouse NFT</option>
      <option value="0">Beta Tester NFT</option>
    </select>
    <input type="number" id="airdropAmount" placeholder="Enter quantity" value="1" />
    <button onclick="airdropNFT()">Airdrop NFT</button>
  </div>  <div class="section">
    <h2 style="color: red;">Beta Tester List</h2>
    <a href="beta_testers.csv" download>
      <button>Download Beta Tester CSV</button>
    </a>
  </div>  <div class="section">
    <h2 style="color: red;">Log</h2>
    <div id="log">Waiting for connection...</div>
  </div>  <script>
    const contractAddress = "0x30A05D1A59A21A6E32fCb60FbD05b6b5A4A759D2";
    const contractABI = [
      "function mint(address to, uint256 id, uint256 amount) public",
      "function airdrop(address recipient, uint256 id, uint256 amount) public"
    ];

    let provider;
    let signer;
    let contract;

    async function connectWallet() {
      try {
        if (window.ethereum) {
          provider = new ethers.providers.Web3Provider(window.ethereum);
          await provider.send("eth_requestAccounts", []);
          signer = provider.getSigner();
          const address = await signer.getAddress();
          document.getElementById("walletAddress").innerText = address;
          contract = new ethers.Contract(contractAddress, contractABI, signer);
          log("Wallet connected: " + address);
        } else {
          alert("Please install a Web3 wallet like MetaMask or Brave Wallet");
        }
      } catch (err) {
        log("Connection error: " + err.message);
      }
    }

    async function mintNFT() {
      try {
        const id = parseInt(document.getElementById("mintType").value);
        const amount = parseInt(document.getElementById("mintAmount").value);
        const address = await signer.getAddress();
        log(`Minting to: ${address} | ID: ${id}, Qty: ${amount}`);
        const tx = await contract.mint(address, id, amount);
        await tx.wait();
        log("Mint successful!");
      } catch (err) {
        log("Mint failed: " + err.message);
        alert("Mint failed: " + err.message);
      }
    }

    async function airdropNFT() {
      try {
        const to = document.getElementById("airdropWallet").value.trim();
        const id = parseInt(document.getElementById("airdropType").value);
        const amount = parseInt(document.getElementById("airdropAmount").value);
        log(`Airdropping to: ${to} | ID: ${id}, Qty: ${amount}`);
        const tx = await contract.airdrop(to, id, amount);
        await tx.wait();
        log("Airdrop successful!");
      } catch (err) {
        log("Airdrop failed: " + err.message);
        alert("Airdrop failed: " + err.message);
      }
    }

    function log(msg) {
      const box = document.getElementById("log");
      box.innerText += `\n${msg}`;
    }
  </script></body>
</html>
