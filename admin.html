
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
  <style>
    body { font-size: 26px; background-color: #1e1e1e; color: white; font-family: Arial, sans-serif; }
    input, select, textarea { background-color: #333; color: white; font-size: 26px; padding: 10px; border: 1px solid #555; margin-bottom: 10px; width: 90%; }
    button { font-size: 26px; padding: 10px 20px; background-color: red; color: white; border: none; margin-top: 10px; }
    .section { margin-bottom: 40px; }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <div class="section">
    <h2>Mint NFTs</h2>
    <label for="mint-id">Select NFT ID:</label><br>
    <select id="mint-id">
      <option value="A1">A1 - Skater Mouse</option>
      <option value="A2">A2 - Beta Tester</option>
      <option value="A3">A3 - Paid NFT</option>
      <option value="A4">A4 - Premium NFT</option>
      <option value="M1">M1 - Mystery 1</option>
      <option value="M2">M2 - Mystery 2</option>
      <option value="S1">S1 - Rapper Mouse</option>
    </select><br>
    <input type="text" placeholder="Quantity to Mint"/>
    <button>Mint NFT</button>
  </div>

  <div class="section">
    <h2>Airdrop NFT</h2>
    <input type="text" placeholder="Wallet Address"/>
    <input type="text" placeholder="NFT ID"/>
    <button>Airdrop</button>
  </div>

  <div class="section">
    <h2>Beta Tester Signups</h2>
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ21BetaTestSheet/pubhtml?widget=true&amp;headers=false" width="100%" height="400"></iframe>
  </div>

  <div class="section">
    <h2>Referral Tracking</h2>
    <p>Automatically generated referral codes tied to wallet addresses with link tracking.</p>
  </div>

  <div class="section">
    <h2>Purchase Tracking (NFTs #3 & #4)</h2>
    <p>Wallet, NFT purchased, amount paid, and date displayed here.</p>
  </div>

</body>
</html>
