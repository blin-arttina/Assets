<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Assets Alert Admin – Working Mint</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 22px;
      padding: 24px;
    }
    h1, h2 {
      color: #ff2e2e;
      font-size: 32px;
    }
    input, select, button {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      font-size: 20px;
      background-color: #1e1e1e;
      color: white;
      border: 1px solid gray;
    }
    .button {
      background-color: #ff2e2e;
      color: white;
      border: 1px solid gray;
      cursor: pointer;
    }
    .log {
      font-size: 16px;
      background: #1a1a1a;
      padding: 12px;
      margin-top: 20px;
      border: 1px solid gray;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Assets Alert Admin – Working Mint</h1>
<p id="status">Wallet: Not connected</p>
<button onclick="connectWallet()">Connect Wallet</button>

<h2>Mint NFT</h2>
<select id="nftId">
  <option value="1">Beta Tester NFT</option>
  <option value="2">Skater Mouse NFT</option>
</select>
<input type="number" id="quantity" placeholder="Quantity" />
<button onclick="mintNFT()">Mint NFT</button>

<h2>Log</h2>
<div class="log" id="log">Waiting...</div>

<script>
  const contractAddress = "0x74Ff2E607dA8C0DA1F62e7AC328FC0EbBeA1c85a";
  const allowedAddress = "0xB7Acf7F61e360baB855A86742be5273baB69B153";

  const abi = [
    {
      "inputs": [
        { "internalType": "address", "name": "to", "type": "address" },
        { "internalType": "uint256", "name": "id", "type": "uint256" },
        { "internalType": "uint256", "name": "amount", "type": "uint256" }
      ],
      "name": "mint",
      "outputs": [],
      "stateMutability": "nonpayable",
      "type": "function"
    }
  ];

  let provider, signer, contract, connectedWallet = null;

  function log(msg) {
    const logBox = document.getElementById("log");
    logBox.textContent += "\n" + msg;
    console.log(msg);
  }

  async function connectWallet() {
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      connectedWallet = ethers.utils.getAddress(accounts[0]);

      if (connectedWallet.toLowerCase() !== allowedAddress.toLowerCase()) {
        document.body.innerHTML = "<h1 style='color:red;'>Access Denied</h1>";
        return;
      }

      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      contract = new ethers.Contract(contractAddress, abi, signer);

      document.getElementById("status").textContent = "Wallet Connected: " + connectedWallet;
      log("Wallet connected: " + connectedWallet);
      log("Contract ready: " + contractAddress);
    } catch (err) {
      alert("Wallet connection failed: " + err.message);
      log("Connect error: " + err.message);
    }
  }

  async function mintNFT() {
    if (!contract || !connectedWallet) {
      alert("Please connect wallet first.");
      return;
    }

    const id = parseInt(document.getElementById("nftId").value);
    const qty = parseInt(document.getElementById("quantity").value);

    try {
      log(`Minting to: ${connectedWallet} | ID: ${id}, Qty: ${qty}`);
      const tx = await contract.mint(connectedWallet, id, qty);
      alert("Minted! Tx: " + tx.hash);
      log("Mint successful! Tx: " + tx.hash);
    } catch (err) {
      alert("Mint failed: " + err.message);
      log("Mint error: " + err.message);
    }
  }
</script>

</body>
</html>
