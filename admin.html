<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      color: #ff0000;
    }
    .section {
      border: 1px solid gray;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
    }
    label, select, input {
      display: block;
      margin: 5px 0;
    }
    button {
      background-color: red;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    pre {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <div class="section">
    <h2>Mint NFT</h2>
    <label for="mintType">Select NFT:</label>
    <select id="mintType">
      <option value="1">Beta Tester NFT</option>
      <option value="2">Paid NFT</option>
      <option value="3">Premium NFT</option>
      <option value="4">Mystery NFT 1</option>
      <option value="5">Mystery NFT 2</option>
      <option value="6">Skater Mouse NFT</option>
    </select>
    <label for="mintQty">Quantity:</label>
    <input type="number" id="mintQty" value="1" min="1"/>
    <button onclick="mintNFT()">Mint NFT</button>
  </div>

  <div class="section">
    <h2>Airdrop NFT</h2>
    <label for="airdropAddress">Wallet Address:</label>
    <input type="text" id="airdropAddress" />
    <label for="airdropType">NFT Type:</label>
    <select id="airdropType">
      <option value="1">Beta Tester NFT</option>
      <option value="2">Paid NFT</option>
      <option value="3">Premium NFT</option>
      <option value="4">Mystery NFT 1</option>
      <option value="5">Mystery NFT 2</option>
      <option value="6">Skater Mouse NFT</option>
    </select>
    <label for="airdropQty">Quantity:</label>
    <input type="number" id="airdropQty" value="1" min="1"/>
    <button onclick="airdropNFT()">Airdrop NFT</button>
  </div>

  <div class="section">
    <h2>Purchase Tracking (Simulated)</h2>
    <pre id="purchaseLog">Loading purchase log...</pre>
  </div>

  <div class="section">
    <h2>Beta Tester Submissions</h2>
    <pre id="betaList">Loading beta testers...</pre>
  </div>

  <script>
    async function mintNFT() {
      alert("Minting NFT (simulated)...");
    }

    async function airdropNFT() {
      alert("Airdrop NFT (simulated)...");
    }

    async function loadPurchaseLog() {
      document.getElementById("purchaseLog").innerText =
        "No real purchase tracking available.\n(To be connected via smart contract events)";
    }

    async function loadBetaTesters() {
      try {
        const res = await fetch("https://secure-signup-server.onrender.com/api/beta-testers");
        if (!res.ok) throw new Error("Server response not OK");
        const data = await res.json();
        document.getElementById("betaList").innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById("betaList").innerText = "Error loading beta testers.";
      }
    }

    loadPurchaseLog();
    loadBetaTesters();
  </script>
</body>
</html>
