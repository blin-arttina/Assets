<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blind_Art Admin Page v5</title>
  <style>
    body { background: black; color: white; font-family: Arial, sans-serif; padding: 20px; }
    h1 { font-size: 26px; color: white; }
    button { background: red; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 10px; font-size: 18px; }
    #diagnostics { background: #111; padding: 10px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; color: #0f0; font-family: monospace; }
  </style>
</head>
<body>
  <h1>Blind_Art Admin Page v5</h1>
  <p>Auto-connect Brave Wallet, Trust Wallet, and Base via WalletConnect.<br>
     Includes RPC selector, retry, cancel, airdrop, and detailed diagnostics.</p>

  <div>
    <button onclick="connectBrave()">Connect Brave</button>
    <button onclick="connectTrust()">Connect Trust</button>
    <button onclick="connectBase()">Connect Base</button>
  </div>

  <h2>RPC (Polygon)</h2>
  <p>Default: <strong>https://polygon-rpc.com</strong> (No API key needed)</p>

  <div id="status">Not connected.</div>

  <button onclick="downloadDiagnostics()">Download Diagnostics</button>

  <div id="diagnostics">Diagnostics will appear here…</div>

  <script>
    let diagnostics = "";

    function logDiag(msg) {
      const time = new Date().toLocaleTimeString();
      diagnostics += `[${time}] ${msg}\n`;
      document.getElementById('diagnostics').innerText = diagnostics;
    }

    function connectBrave() {
      logDiag("Attempting Brave auto-connect…");
      // Injected provider simulation
      if (typeof window.ethereum !== "undefined") {
        window.ethereum.request({ method: "eth_requestAccounts" })
          .then(acc => {
            document.getElementById('status').innerText = "Connected: " + acc[0];
            logDiag("Brave connected with account " + acc[0]);
          })
          .catch(err => logDiag("Brave connect error: " + err.message));
      } else {
        logDiag("No injected wallet found in Brave.");
      }
    }

    function connectTrust() {
      logDiag("Trust Wallet connection requested (via WalletConnect).");
    }

    function connectBase() {
      logDiag("Base Wallet connection requested (via WalletConnect).");
    }

    function downloadDiagnostics() {
      const blob = new Blob([diagnostics], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "diagnostics.txt";
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
