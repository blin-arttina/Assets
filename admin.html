
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <style>
    body { background-color: #111; color: white; font-size: 24px; font-family: sans-serif; padding: 20px; }
    .btn { background-color: red; color: white; padding: 10px 20px; margin: 10px 0; border: none; cursor: pointer; }
    input { font-size: 20px; margin: 5px; }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Panel</h1>

  <h2>Mint NFT</h2>
  <form action="/mint" method="POST">
    <label>Wallet Address:</label><br>
    <input type="text" name="wallet" required><br>
    <label>NFT ID:</label><br>
    <input type="number" name="nftId" required><br>
    <button class="btn" type="submit">Mint</button>
  </form>

  <h2>Airdrop NFT</h2>
  <form action="/airdrop" method="POST">
    <label>Wallet Address:</label><br>
    <input type="text" name="wallet" required><br>
    <label>NFT ID:</label><br>
    <input type="number" name="nftId" required><br>
    <button class="btn" type="submit">Airdrop</button>
  </form>

  <h2>Beta Tester Signups</h2>
  <div id="beta-signups">Loading signups...</div>

  <h2>Purchase Tracking</h2>
  <div id="purchase-tracker">Loading purchase data...</div>

</body>
</html>
