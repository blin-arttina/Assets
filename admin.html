<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets Alert Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-size: 18px;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #ff4444;
    }
    button {
      background-color: #cc0000;
      color: white;
      border: 2px solid gray;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
    select, input {
      font-size: 18px;
      padding: 5px;
      border: 1px solid gray;
      background-color: #333;
      color: white;
    }
    .section {
      margin-bottom: 25px;
    }
    #log {
      white-space: pre-wrap;
      background-color: #1e1e1e;
      padding: 10px;
      border: 1px solid gray;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>
  <p>Wallet Connected: <span id="walletAddress">Not connected</span></p>
  <button onclick="connectWallet()">Connect Wallet</button>  <div class="section">
    <h2>Mint NFT</h2>
    <select id="nftSelect">
      <option value="2">Skater Mouse NFT</option>
    </select>
    <input id="mintQty" type="number" placeholder="Quantity" value="1" />
    <button onclick="mintNFT()">Mint NFT</button>
  </div>  <div class="section">
    <h2>Airdrop NFT</h2>
    <input id="recipient" type="text" placeholder="Recipient address" />
    <select id="airdropSelect">
      <option value="2">Skater Mouse NFT</option>
    </select>
    <input id="airdropQty" type="number" placeholder="Quantity" value="1" />
    <button onclick="airdropNFT()">Airdrop NFT</button>
  </div>  <div class="section">
    <h2>Beta Tester List</h2>
    <button onclick="downloadBetaList()">Download Beta Tester CSV</button>
  </div>  <div id="log">Waiting for connection...</div>  <script>
    const contractAddress = "0x30A05D1A59A21A6E32fCb60FbD05b6b5A4A759D2";
    const abi = [
      "function mint(address to, uint256 id, uint256 amount, bytes memory data) public",
      "function airdrop(address to, uint256 id, uint256 amount) public"
    ];

    let provider, signer, contract;

    async function connectWallet() {
      if (window.ethereum) {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        contract = new ethers.Contract(contractAddress, abi, signer);
        const address = await signer.getAddress();
        document.getElementById("walletAddress").textContent = address;
        log(`Wallet connected: ${address}`);
      } else {
        log("Please install a Web3 wallet like MetaMask or Brave Wallet.");
      }
    }

    async function mintNFT() {
      try {
        const address = await signer.getAddress();
        const id = document.getElementById("nftSelect").value;
        const qty = document.getElementById("mintQty").value;
        log(`Minting to ${address} | ID: ${id}, Qty: ${qty}`);
        await contract.mint(address, id, qty, "0x");
        log("Mint success!");
      } catch (err) {
        log("Mint failed: " + err.message);
      }
    }

    async function airdropNFT() {
      try {
        const to = document.getElementById("recipient").value;
        const id = document.getElementById("airdropSelect").value;
        const qty = document.getElementById("airdropQty").value;
        log(`Airdropping to ${to} | ID: ${id}, Qty: ${qty}`);
        await contract.airdrop(to, id, qty);
        log("Airdrop success!");
      } catch (err) {
        log("Airdrop failed: " + err.message);
      }
    }

    function downloadBetaList() {
      const csv = "Name,Email,Wallet\nTester1,tester@example.com,0x...";
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "beta_testers.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    function log(message) {
      document.getElementById("log").textContent += `\n${message}`;
    }
  </script></body>
</html>
