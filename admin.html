
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assets Alert Admin</title>
  <style>
    body { background-color: #121212; color: white; font-family: Arial, sans-serif; font-size: 20px; padding: 20px; }
    input, select, button { margin: 10px 0; padding: 12px; width: 100%; font-size: 18px; border: 1px solid gray; background: #222; color: white; }
    button { background-color: red; color: white; border: none; }
    .section { border: 1px solid gray; padding: 20px; margin-top: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <div class="section">
    <h2>Mint NFT</h2>
    <label for="nftId">Select NFT:</label>
    <select id="nftId">
      <option value="1">Skater Mouse NFT (ID: 1)</option>
      <option value="2">Beta Tester NFT (ID: 2)</option>
      <option value="3">Paid NFT (ID: 3)</option>
      <option value="4">Premium NFT (ID: 4)</option>
      <option value="5">Mystery NFT 1 (ID: 5)</option>
      <option value="6">Mystery NFT 2 (ID: 6)</option>
    </select>
    <label for="mintQty">Quantity:</label>
    <input type="number" id="mintQty" placeholder="Enter quantity">
    <button onclick="mintNFT()">Mint NFT</button>
  </div>

  <div class="section">
    <h2>Airdrop NFT</h2>
    <label for="airdropTo">Recipient Wallet Address:</label>
    <input type="text" id="airdropTo" placeholder="0x...">
    <label for="airdropId">NFT ID:</label>
    <input type="number" id="airdropId" placeholder="e.g., 1">
    <label for="airdropQty">Quantity:</label>
    <input type="number" id="airdropQty" value="1">
    <button onclick="airdropNFT()">Airdrop NFT</button>
  </div>

  <div class="section">
    <h2>Beta Tester Sign-Ups</h2>
    <div id="betaTesterList">Loading beta testers...</div>
  </div>

  <div class="section">
    <h2>Purchase Tracker</h2>
    <p><strong>Paid NFT (ID: 3):</strong> <span id="paidCount">0</span></p>
    <p><strong>Premium NFT (ID: 4):</strong> <span id="premiumCount">0</span></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script>
    const contractAddress = "0xCdb25eb86266cAA0C175144eF4FB241A2F79390E";
    const abi = [
      {
        "inputs": [
          { "internalType": "address", "name": "to", "type": "address" },
          { "internalType": "uint256", "name": "id", "type": "uint256" },
          { "internalType": "uint256", "name": "amount", "type": "uint256" },
          { "internalType": "bytes", "name": "data", "type": "bytes" }
        ],
        "name": "mint",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
      },
      {
        "inputs": [],
        "name": "uri",
        "outputs": [{ "internalType": "string", "name": "", "type": "string" }],
        "stateMutability": "view",
        "type": "function"
      }
    ];

    let web3;
    let contract;
    let accounts;

    async function loadWeb3() {
      if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        await window.ethereum.enable();
        accounts = await web3.eth.getAccounts();
        contract = new web3.eth.Contract(abi, contractAddress);
      } else {
        alert("Web3 wallet not detected. Use Brave or MetaMask.");
      }
    }

    async function mintNFT() {
      const id = document.getElementById('nftId').value;
      const qty = document.getElementById('mintQty').value;
      try {
        await contract.methods.mint(accounts[0], id, qty, "0x").send({ from: accounts[0] });
        if (id === "3") document.getElementById("paidCount").textContent++;
        if (id === "4") document.getElementById("premiumCount").textContent++;
        alert("NFT Minted!");
      } catch (err) {
        alert("Minting failed: " + err.message);
      }
    }

    async function airdropNFT() {
      const to = document.getElementById('airdropTo').value;
      const id = document.getElementById('airdropId').value;
      const qty = document.getElementById('airdropQty').value;
      try {
        await contract.methods.mint(to, id, qty, "0x").send({ from: accounts[0] });
        alert("NFT Airdropped!");
      } catch (err) {
        alert("Airdrop failed: " + err.message);
      }
    }

    async function loadBetaTesters() {
      const response = await fetch("https://blin-arttina.github.io/Assets/beta_testers.json");
      if (!response.ok) {
        document.getElementById("betaTesterList").textContent = "Failed to load beta testers.";
        return;
      }
      const testers = await response.json();
      const listHtml = testers.map(t => `<p>${t.name} (${t.email})</p>`).join('');
      document.getElementById("betaTesterList").innerHTML = listHtml;
    }

    window.onload = async () => {
      await loadWeb3();
      loadBetaTesters();
    };
  </script>
</body>
</html>
