<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Assets Alert – Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 22px;
      padding: 24px;
    }
    h1, h2 {
      color: #ff2e2e;
      font-size: 32px;
    }
    input, select, button {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      font-size: 20px;
      background-color: #1e1e1e;
      color: white;
      border: 1px solid gray;
    }
    .button {
      background-color: #ff2e2e;
      color: white;
      border: 1px solid gray;
      cursor: pointer;
    }
    .log {
      font-size: 16px;
      background: #1a1a1a;
      padding: 12px;
      margin-top: 20px;
      border: 1px solid gray;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Assets Alert Admin Dashboard</h1>
<p id="status">Wallet: Not connected</p>
<button onclick="connectWallet()">Connect Wallet</button>

<h2>Mint NFT</h2>
<select id="nftId">
  <option value="1">Beta Tester NFT</option>
  <option value="2">Skater Mouse NFT</option>
</select>
<input type="number" id="quantity" placeholder="Quantity" />
<button onclick="mintNFT()">Mint NFT</button>

<h2>Log</h2>
<div class="log" id="log">Waiting...</div>

<script>
  const contractAddress = "0x3C40b0fB107F70d8C602a7A7B71c9f340A37dBe0";
  const allowedAddress = "0xB7Acf7F61e360baB855A86742be5273baB69B153";

  const abi = [
    {
      inputs: [
        { internalType: "address", name: "to", type: "address" },
        { internalType: "uint256", name: "id", type: "uint256" },
        { internalType: "uint256", name: "amount", type: "uint256" }
      ],
      name: "mint",
      outputs: [],
      stateMutability: "nonpayable",
      type: "function"
    }
  ];

  let provider, signer, contract;

  function log(msg) {
    const logBox = document.getElementById("log");
    logBox.textContent += "\n" + msg;
    console.log(msg);
  }

  async function connectWallet() {
    try {
      if (!window.ethereum) {
        alert("Brave Wallet not detected.");
        return;
      }

      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      const address = accounts[0];

      if (address.toLowerCase() !== allowedAddress.toLowerCase()) {
        document.body.innerHTML = "<h1 style='color: red;'>Access Denied</h1>";
        return;
      }

      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      contract = new ethers.Contract(contractAddress, abi, signer);

      document.getElementById("status").textContent = "Wallet Connected: " + address;
      log("Wallet connected and contract ready.");
    } catch (err) {
      alert("Connection failed: " + err.message);
      log("Connection error: " + err.message);
    }
  }

  async function mintNFT() {
    if (!contract || !signer) {
      alert("Wallet not connected.");
      return;
    }

    const id = document.getElementById("nftId").value;
    const qty = document.getElementById("quantity").value;

    try {
      const to = await signer.getAddress();
      log(`Minting to: ${to}, ID: ${id}, Qty: ${qty}`);
      const tx = await contract.mint(to, id, qty);
      log("Minted! Tx: " + tx.hash);
      alert("Minted successfully!");
    } catch (err) {
      alert("Mint failed: " + err.message);
      log("Mint failed: " + err.message);
    }
  }
</script>

</body>
</html>
