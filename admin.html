
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assets Alert Admin</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        select, input, button { margin: 10px 0; padding: 10px; width: 100%; }
        button { background-color: red; color: white; border: none; cursor: pointer; }
        .section { margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Assets Alert Admin</h1>
        <div class="section">
            <h2>Mint NFT</h2>
            <select id="nftType">
                <option value="1">Skater Mouse NFT</option>
                <option value="2">Beta Tester NFT</option>
                <option value="3">Paid NFT</option>
                <option value="4">Premium NFT</option>
                <option value="5">Mystery NFT #1</option>
                <option value="6">Mystery NFT #2</option>
            </select>
            <button onclick="mintNFT()">Mint</button>
        </div>
        <div class="section">
            <h2>Airdrop</h2>
            <input type="text" id="airdropAddresses" placeholder="Comma-separated wallet addresses">
            <button onclick="airdropNFT()">Airdrop</button>
        </div>
        <div class="section">
            <h2>Beta Tester Submissions</h2>
            <button onclick="downloadCSV()">Download CSV</button>
            <pre id="betaTesterList">Loading...</pre>
        </div>
    </div>
    <script>
        const userWallet = "CONNECT_WALLET_HERE";

        function mintNFT() {
            const nftType = document.getElementById('nftType').value;
            const recipient = userWallet; // Automatically use connected wallet
            const amount = 1;
            const data = "0x00";
            console.log("Minting NFT:", { recipient, nftType, amount, data });
            // Contract call would go here
            alert("Mint initiated (simulated).");
        }

        function airdropNFT() {
            const addresses = document.getElementById('airdropAddresses').value.split(',');
            console.log("Airdropping to:", addresses);
            alert("Airdrop initiated (simulated).");
        }

        function downloadCSV() {
            window.location.href = 'beta_testers.csv';
        }

        // Simulate fetching CSV content and displaying it
        fetch('beta_testers.csv')
            .then(response => response.text())
            .then(data => document.getElementById('betaTesterList').textContent = data)
            .catch(() => document.getElementById('betaTesterList').textContent = "Could not load beta tester data.");
    </script>
</body>
</html>
