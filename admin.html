<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin Panel</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 24px;
      padding: 20px;
    }
    h1 {
      color: red;
    }
    section {
      margin-bottom: 40px;
    }
    button, select, input {
      font-size: 24px;
      margin: 5px 0;
      padding: 10px;
      background-color: #222;
      color: #fff;
      border: 2px solid gray;
      border-radius: 5px;
    }
    .box {
      border: 2px solid gray;
      padding: 15px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <section id="walletStatus">
    <strong>Wallet Status:</strong>
    <span id="walletAddress">Connecting...</span>
  </section>

  <section id="mintSection" class="box">
    <h2>Mint NFT</h2>
    <label for="nftSelect">Select NFT:</label>
    <select id="nftSelect">
      <option value="1">Skater Mouse NFT</option>
      <option value="2">Beta Tester NFT</option>
      <option value="3">Paid NFT</option>
      <option value="4">Premium NFT</option>
      <option value="5">Mystery NFT 1</option>
      <option value="6">Mystery NFT 2</option>
    </select><br/>
    <label for="mintQuantity">Quantity:</label>
    <input type="number" id="mintQuantity" value="1" min="1"/><br/>
    <button onclick="mintNFT()">Mint</button>
  </section>

  <section id="airdropSection" class="box">
    <h2>Airdrop NFT</h2>
    <label for="airdropAddress">Recipient Wallet Address:</label><br/>
    <input type="text" id="airdropAddress" placeholder="0x..."/><br/>
    <label for="airdropSelect">Select NFT:</label>
    <select id="airdropSelect">
      <option value="1">Skater Mouse NFT</option>
      <option value="2">Beta Tester NFT</option>
      <option value="3">Paid NFT</option>
      <option value="4">Premium NFT</option>
      <option value="5">Mystery NFT 1</option>
      <option value="6">Mystery NFT 2</option>
    </select><br/>
    <label for="airdropQuantity">Quantity:</label>
    <input type="number" id="airdropQuantity" value="1" min="1"/><br/>
    <button onclick="airdropNFT()">Airdrop</button>
  </section>

  <section id="betaTesters" class="box">
    <h2>Beta Tester Sign-Ups</h2>
    <div id="betaTesterList">Loading...</div>
  </section>

  <section id="purchaseTracking" class="box">
    <h2>Purchase Tracker</h2>
    <div id="purchaseLog">Loading...</div>
  </section>

  <script>
    async function connectWallet() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          document.getElementById('walletAddress').textContent = accounts[0];
        } catch (error) {
          document.getElementById('walletAddress').textContent = 'Connection failed';
        }
      } else {
        document.getElementById('walletAddress').textContent = 'Wallet not available';
      }
    }

    function mintNFT() {
      const id = document.getElementById('nftSelect').value;
      const quantity = document.getElementById('mintQuantity').value;
      alert(`Minting NFT ID ${id} (x${quantity})`);
      // Your mint logic goes here
    }

    function airdropNFT() {
      const address = document.getElementById('airdropAddress').value;
      const id = document.getElementById('airdropSelect').value;
      const quantity = document.getElementById('airdropQuantity').value;
      alert(`Airdropping NFT ID ${id} (x${quantity}) to ${address}`);
      // Your airdrop logic goes here
    }

    async function loadBetaTesters() {
      try {
        const res = await fetch('/submissions');
        const data = await res.json();
        const list = document.getElementById('betaTesterList');
        list.innerHTML = data.length ? data.map(
          d => `<div>${d.name} | ${d.email} | ${d.wallet}</div>`
        ).join('') : 'No sign-ups yet.';
      } catch (err) {
        document.getElementById('betaTesterList').textContent = 'Error loading data';
      }
    }

    async function loadPurchases() {
      try {
        const res = await fetch('/purchases');
        const data = await res.json();
        const log = document.getElementById('purchaseLog');
        log.innerHTML = data.length ? data.map(
          p => `<div>${p.buyer} bought NFT #${p.nftId}</div>`
        ).join('') : 'No purchases yet.';
      } catch (err) {
        document.getElementById('purchaseLog').textContent = 'Error loading purchases';
      }
    }

    connectWallet();
    loadBetaTesters();
    loadPurchases();
  </script>
</body>
</html>
