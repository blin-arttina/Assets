
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      padding: 20px;
    }
    h1, h2 {
      color: #ff3333;
    }
    button, select, input {
      background-color: #b30000;
      color: white;
      border: 2px solid gray;
      font-size: 18px;
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
    }
    input, select {
      width: 100%;
      max-width: 400px;
    }
    .section {
      margin-bottom: 30px;
    }
    #log {
      background: #222;
      padding: 10px;
      border-radius: 6px;
      white-space: pre-wrap;
      max-width: 500px;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <div class="section">
    <div id="wallet">Wallet Connected: Not connected</div>
    <button onclick="connectWallet()">Connect Wallet</button>
  </div>

  <div class="section">
    <h2>Mint NFT</h2>
    <select id="nftToMint">
      <option value="0">Skater Mouse NFT</option>
      <option value="1">Beta Tester NFT</option>
      <option value="2">Paid NFT</option>
      <option value="3">Premium NFT</option>
      <option value="4">Mystery NFT 1</option>
      <option value="5">Mystery NFT 2</option>
    </select><br/>
    <input id="mintQty" type="number" placeholder="Quantity" /><br/>
    <button onclick="mintNFT()">Mint NFT</button>
  </div>

  <div class="section">
    <h2>Airdrop NFT</h2>
    <input id="airdropAddress" placeholder="Recipient Address" /><br/>
    <select id="airdropNFT">
      <option value="0">Skater Mouse NFT</option>
      <option value="1">Beta Tester NFT</option>
      <option value="2">Paid NFT</option>
      <option value="3">Premium NFT</option>
      <option value="4">Mystery NFT 1</option>
      <option value="5">Mystery NFT 2</option>
    </select><br/>
    <input id="airdropQty" type="number" placeholder="Quantity" /><br/>
    <button onclick="airdropNFT()">Airdrop NFT</button>
  </div>

  <div class="section">
    <h2>Beta Tester List</h2>
    <a href="beta_testers.csv" download>
      <button>Download Beta Tester CSV</button>
    </a>
  </div>

  <div class="section">
    <h2>Log</h2>
    <div id="log">Waiting for connection...</div>
  </div>

<script>
let provider;
let signer;
let contract;

const contractAddress = "0x30A05D1A59A21A6E32fCb60FbD05b6b5A4A759D2";
const contractABI = [
  "function mint(address to, uint256 id, uint256 amount, bytes memory data) public",
  "function airdrop(address to, uint256 id, uint256 qty) public"
];

function log(msg) {
  const logEl = document.getElementById("log");
  logEl.textContent += "\n" + msg;
}

async function connectWallet() {
  if (!window.ethereum) return alert("No wallet found.");
  provider = new ethers.providers.Web3Provider(window.ethereum, "any");
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  const address = await signer.getAddress();
  document.getElementById("wallet").innerText = "Wallet Connected: " + address;
  contract = new ethers.Contract(contractAddress, contractABI, signer);
  log("Connected wallet: " + address);
}

async function mintNFT() {
  if (!contract) return alert("Connect wallet first.");
  const id = document.getElementById("nftToMint").value;
  const qty = document.getElementById("mintQty").value;
  const to = await signer.getAddress();
  try {
    const tx = await contract.mint(to, id, qty, "0x");
    log("Minting NFT... TX Hash: " + tx.hash);
    await tx.wait();
    log("Minted NFT ID " + id + " Qty " + qty);
  } catch (e) {
    log("Error: " + e.message);
  }
}

async function airdropNFT() {
  if (!contract) return alert("Connect wallet first.");
  const to = document.getElementById("airdropAddress").value;
  const id = document.getElementById("airdropNFT").value;
  const qty = document.getElementById("airdropQty").value;
  try {
    const tx = await contract.mint(to, id, qty, "0x");
    log("Airdropping NFT... TX Hash: " + tx.hash);
    await tx.wait();
    log("Airdropped NFT ID " + id + " to " + to);
  } catch (e) {
    log("Error: " + e.message);
  }
}
</script>

</body>
</html>
