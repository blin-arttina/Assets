
<!DOCTYPE html>
<html>
<head>
  <title>Assets Alert Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body style="background-color:#111;color:#fff;font-family:sans-serif">
  <h1>Assets Alert Admin Dashboard</h1>

  <div>
    <p><strong>Connected Wallet:</strong> <span id="wallet-address">Not connected</span></p>
    <button onclick="connectWallet()" style="background:#f00;color:#fff;padding:10px">Connect Wallet</button>
  </div>

  <div>
    <label>Set Contract Metadata URI:</label><br>
    <input type="text" id="set-uri-input" placeholder="https://yourdomain.com/{id}.json" style="width:80%">
    <button onclick="setURI()" style="background:#f00;color:#fff;padding:10px">Set URI</button>
  </div>

  <script>
    const CONTRACT_ADDRESS = "0xCdb25eb86266cAA0C175144eF4FB241A2F79390E";
    const ABI = [
      "function setURI(string memory newuri) public",
      "function uri(uint256 id) public view returns (string memory)",
      "function owner() public view returns (address)"
    ];
    let signer;

    async function connectWallet() {
      if (window.ethereum) {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const address = await signer.getAddress();
        document.getElementById("wallet-address").textContent = address;
      } else {
        alert("Brave/MetaMask wallet not found");
      }
    }

    async function setURI() {
      const uri = document.getElementById("set-uri-input").value;
      if (!uri) return alert("Enter a URI.");
      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

        const tx = await contract.setURI(uri, { gasLimit: 500000 });
        await tx.wait();
        alert("URI successfully set!");
      } catch (error) {
        console.error("Failed to set URI", error);
        alert("Failed to set URI: " + (error.message || error));
      }
    }
  </script>
</body>
</html>
