
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assets Alert Admin Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }
        .section {
            margin: 20px;
            padding: 20px;
            border: 2px solid #fff;
            border-radius: 8px;
        }
        input, select, button {
            font-size: 24px;
            margin: 5px 0;
            padding: 10px;
        }
        button {
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="section">
        <h1>Assets Alert Admin Dashboard</h1>
    </div>

    <div class="section">
        <h2>Mint NFT</h2>
        <label for="nft-id">NFT ID:</label><br>
        <input id="nft-id" type="text"><br>
        <label for="quantity">Quantity:</label><br>
        <input id="quantity" type="text"><br>
        <button onclick="alert('Minting...')">Mint NFT</button>
    </div>

    <div class="section">
        <h2>Airdrop NFT</h2>
        <label for="recipient">Recipient:</label><br>
        <input id="recipient" type="text"><br>
        <label for="airdrop-id">NFT ID:</label><br>
        <input id="airdrop-id" type="text"><br>
        <label for="airdrop-qty">Quantity:</label><br>
        <input id="airdrop-qty" type="text"><br>
        <button onclick="alert('Airdropping...')">Airdrop NFT</button>
    </div>

    <div class="section">
        <h2>Beta Tester Sign-Ups</h2>
        <iframe src="https://docs.google.com/spreadsheets/d/16Us34cs43Cj-xEM0axRM5euzJH2GRNR79tEQn3uIMlE/edit?usp=sharing"></iframe>
    </div>
</body>
</html>
