<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Testnet Minting</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
  <style>
    body { background-color: #121212; color: white; font-family: Arial, sans-serif; padding: 20px; }
    h1 { color: #ff2e2e; }
    input, select, button {
      width: 100%; margin: 10px 0; padding: 10px;
      background: #1e1e1e; color: white; border: 1px solid gray;
    }
    .button { background: #ff2e2e; border: 1px solid gray; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Live Minting Panel (Polygon Mumbai)</h1>
  <button class="button" onclick="connectWallet()">Connect Wallet</button>
  <p id="walletAddress">Wallet: Not connected</p>
  <select id="nftSelect">
    <option value="1">Beta Tester NFT</option>
    <option value="2">Skater Mouse NFT</option>
    <option value="3">Paid NFT</option>
    <option value="4">Premium NFT</option>
  </select>
  <input type="number" id="quantity" placeholder="Quantity" />
  <button class="button" onclick="mintNFT()">Mint NFT</button>

  <script>
    const contractAddress = "0x06Fe9E5feF1C3F3AeAF4Aa2cCFAB4989B21AB59F";
    const abi = [{"inputs":[{"internalType":"uint256","name":"id","type":"uint256"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"mint","outputs":[],"stateMutability":"nonpayable","type":"function"}];

    let provider;
    let signer;
    let contract;

    async function connectWallet() {
      const walletConnectProvider = new window.WalletConnectProvider.default({
        rpc: {
          80001: "https://rpc-mumbai.maticvigil.com"
        },
        chainId: 80001
      });

      await walletConnectProvider.enable();
      provider = new ethers.providers.Web3Provider(walletConnectProvider);
      signer = provider.getSigner();
      const address = await signer.getAddress();
      document.getElementById("walletAddress").innerText = "Wallet: " + address;
      contract = new ethers.Contract(contractAddress, abi, signer);
    }

    async function mintNFT() {
      const id = document.getElementById("nftSelect").value;
      const quantity = document.getElementById("quantity").value;
      if (!contract || !signer) return alert("Connect wallet first");

      try {
        const tx = await contract.mint(id, quantity);
        alert("Transaction sent! Hash: " + tx.hash);
      } catch (err) {
        console.error(err);
        alert("Mint failed: " + err.message);
      }
    }
  </script>
</body>
</html>
