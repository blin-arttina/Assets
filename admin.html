<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
</head>
<body style="background-color:#121212;color:white;font-size:24px;text-align:center;">
  <h1>Admin Dashboard</h1>

  <h2>Beta Tester Sign-Ups</h2>
  <div id="betaTesterList">Loading...</div>

  <script>
    fetch("https://secure-signup-server.onrender.com/signups")
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("betaTesterList");
        if (data.length === 0) {
          container.innerText = "No signups yet.";
        } else {
          const list = data.map(entry => 
            `<p>${entry.name} | ${entry.email} | ${entry.wallet}</p>`
          ).join("");
          container.innerHTML = list;
        }
      })
      .catch(error => {
        document.getElementById("betaTesterList").innerText = "Error loading data.";
        console.error(error);
      });
  </script>

</body>
</html>
