
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-size: 24px;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: red;
    }
    section {
      margin-bottom: 40px;
      border: 1px solid gray;
      padding: 20px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select, button {
      font-size: 18px;
      margin-top: 5px;
      margin-bottom: 15px;
      padding: 5px;
    }
    button {
      background-color: red;
      color: white;
      border: 1px solid gray;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid white;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <section>
    <h2>Mint NFT</h2>
    <label for="nftSelect">Select NFT:</label>
    <select id="nftSelect">
      <option value="1">Skater Mouse</option>
      <option value="2">Beta Tester</option>
      <option value="3">Paid NFT</option>
      <option value="4">Premium NFT</option>
      <option value="5">Mystery NFT 1</option>
      <option value="6">Mystery NFT 2</option>
    </select>
    <label for="mintQuantity">Quantity:</label>
    <input type="number" id="mintQuantity" value="1" min="1"/>
    <button onclick="mintNFT()">Mint</button>
  </section>

  <section>
    <h2>Airdrop NFT</h2>
    <label for="airdropAddress">Wallet Address:</label>
    <input type="text" id="airdropAddress"/>
    <label for="airdropSelect">Select NFT:</label>
    <select id="airdropSelect">
      <option value="1">Skater Mouse</option>
      <option value="2">Beta Tester</option>
      <option value="3">Paid NFT</option>
      <option value="4">Premium NFT</option>
      <option value="5">Mystery NFT 1</option>
      <option value="6">Mystery NFT 2</option>
    </select>
    <label for="airdropQuantity">Quantity:</label>
    <input type="number" id="airdropQuantity" value="1" min="1"/>
    <button onclick="airdropNFT()">Airdrop</button>
  </section>

  <section>
    <h2>Beta Tester Signups</h2>
    <div id="betaTesterList">Loading beta tester data...</div>
  </section>

  <section>
    <h2>Purchase Tracker</h2>
    <div id="purchaseLog">Listening for NFT #3 and #4 purchase events...</div>
  </section>

  <script>
    // Placeholder JavaScript
    async function mintNFT() {
      alert("Mint function triggered!");
    }

    async function airdropNFT() {
      alert("Airdrop function triggered!");
    }

    async function loadBetaTesters() {
      try {
        const response = await fetch("https://your-server-render.com/api/beta-testers");
        const data = await response.json();
        const display = data.map(t => `<tr><td>${t.name}</td><td>${t.email}</td><td>${t.wallet}</td></tr>`).join('');
        document.getElementById('betaTesterList').innerHTML =
          "<table><tr><th>Name</th><th>Email</th><th>Wallet</th></tr>" + display + "</table>";
      } catch (error) {
        document.getElementById('betaTesterList').innerText = "Could not load beta tester data.";
      }
    }

    loadBetaTesters();
  </script>
</body>
</html>
