
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Assets Alert Admin Dashboard</title>
  <style>
    body { background-color: #121212; color: white; font-family: Arial, sans-serif; font-size: 20px; padding: 20px; }
    input, button, select { margin: 10px 0; padding: 12px; width: 100%; font-size: 18px; }
    button { background-color: red; color: white; border: none; cursor: pointer; }
    .section { border: 1px solid gray; padding: 20px; margin-top: 20px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <div class="section">
    <h2>Mint NFT</h2>
    <label for="nftSelect">Select NFT:</label>
    <select id="nftSelect">
      <option value="1">Skater Mouse NFT (ID: 1)</option>
      <option value="2">Beta Tester NFT (ID: 2)</option>
      <option value="3">Paid NFT (ID: 3)</option>
      <option value="4">Premium NFT (ID: 4)</option>
      <option value="5">Mystery NFT #1 (ID: 5)</option>
      <option value="6">Mystery NFT #2 (ID: 6)</option>
    </select>
    <label>Quantity:</label>
    <input type="number" id="nftQty" />
    <button onclick="mintNFT()">Mint NFT</button>
  </div>

  <div class="section">
    <h2>Airdrop NFT</h2>
    <label>Recipient:</label><input type="text" id="airdropTo" />
    <label>NFT ID:</label><input type="text" id="airdropId" />
    <label>Quantity:</label><input type="number" id="airdropQty" />
    <button onclick="airdropNFT()">Airdrop NFT</button>
  </div>

  <div class="section">
    <h2>Beta Tester Sign-Ups</h2>
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQSO9c8CKcv_kJxvRjaMTXx0hMPLDsmNSRrAfRGMClMgFFx1nZ1GUfZlNW0iGGY0OQyqR7wHxK57On_/pubhtml?widget=true&amp;headers=false" width="100%" height="300"></iframe>
  </div>

  <div class="section">
    <h2>Purchase Tracker</h2>
    <p>Paid NFT (ID: 3): <span id="paidCount">0</span></p>
    <p>Premium NFT (ID: 4): <span id="premiumCount">0</span></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script>
    async function mintNFT() {
      const id = document.getElementById("nftSelect").value;
      const qty = document.getElementById("nftQty").value;
      alert(`Minting NFT ID ${id} with quantity ${qty}`);
    }

    async function airdropNFT() {
      const to = document.getElementById("airdropTo").value;
      const id = document.getElementById("airdropId").value;
      const qty = document.getElementById("airdropQty").value;
      alert(`Airdropping NFT ID ${id} x${qty} to ${to}`);
    }
  </script>
</body>
</html>
