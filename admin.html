
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assets Alert Admin</title>
    <script src="https://unpkg.com/web3@1.8.2/dist/web3.min.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #c62828;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #e53935;
        }
        .wallet-status {
            margin-top: 20px;
            font-size: 20px;
        }
        .container {
            border: 1px solid gray;
            padding: 30px;
            max-width: 400px;
            margin: auto;
            margin-top: 100px;
            background-color: #222;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Assets Alert Admin</h1>
        <p class="wallet-status" id="walletStatus">Connected Wallet: <strong>Not Connected</strong></p>
        <button class="btn" id="connectWallet">Connect Wallet</button>
    </div>

    <script>
        let web3;
        const adminAddress = "0x6502663d6d6ce0496abC0e6D8B5d8E79F7160E2E";

        async function connectWallet() {
            const provider = new WalletConnectProvider.default({
                rpc: {
                    137: "https://polygon-rpc.com"
                },
                chainId: 137
            });

            try {
                await provider.enable();
                web3 = new Web3(provider);
                const accounts = await web3.eth.getAccounts();
                const connectedWallet = accounts[0];

                if (connectedWallet.toLowerCase() === adminAddress.toLowerCase()) {
                    document.getElementById("walletStatus").innerHTML = 
                        "Connected Wallet: <strong style='color:lightgreen'>" + connectedWallet + "</strong>";
                } else {
                    document.getElementById("walletStatus").innerHTML = 
                        "Connected Wallet: <strong style='color:orange'>" + connectedWallet + "</strong> (Not Admin)";
                }

            } catch (e) {
                console.error("WalletConnect error:", e);
            }
        }

        document.getElementById("connectWallet").onclick = connectWallet;
        window.onload = () => {
            connectWallet(); // auto-launch QR code for Trust Wallet on load
        };
    </script>
</body>
</html>
