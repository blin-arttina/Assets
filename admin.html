
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; }
    .container { padding: 20px; max-width: 800px; margin: auto; }
    h1, h2 { color: #fff; }
    .section { margin-bottom: 30px; border: 1px solid gray; padding: 15px; background: #111; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin: 5px 0; }
    button { background-color: red; color: white; padding: 10px 15px; border: none; cursor: pointer; }
    table { width: 100%; margin-top: 10px; border-collapse: collapse; }
    th, td { border: 1px solid gray; padding: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Assets Alert Admin Dashboard</h1>

    <div class="section">
      <h2>Airdrop NFT</h2>
      <form>
        <label for="wallet">Wallet Address:</label>
        <input type="text" id="wallet" />
        <label for="nftid">NFT ID:</label>
        <input type="text" id="nftid" />
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" />
        <button type="submit">Airdrop NFT</button>
      </form>
    </div>

    <div class="section">
      <h2>Beta Tester Sign-Ups</h2>
      <p>Waiting for sign-ups...</p>
    </div>

    <div class="section">
      <h2>Purchase Tracker</h2>
      <p>Waiting for purchases...</p>
    </div>
  </div>
</body>
</html>
