<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard – Assets Alert</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 24px;
      padding: 24px;
    }
    h1, h2 {
      color: #ff2e2e;
      font-size: 34px;
    }
    input, select, button {
      width: 100%;
      padding: 16px;
      margin: 14px 0;
      font-size: 22px;
      background-color: #1e1e1e;
      color: white;
      border: 1px solid gray;
    }
    .button {
      background-color: #ff2e2e;
      border: 1px solid gray;
      color: white;
      cursor: pointer;
    }
    .nav {
      margin-bottom: 20px;
    }
    .nav a {
      margin-right: 16px;
      color: white;
      font-size: 22px;
      text-decoration: none;
      border: 1px solid gray;
      padding: 10px 18px;
      background-color: #ff2e2e;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="nft.html">NFT Showcase</a>
  </div>

  <h1>Admin Dashboard – Polygon Mumbai</h1>
  <p id="walletStatus">Wallet: Not connected</p>
  <button class="button" onclick="connectWallet()">Connect Wallet</button>

  <h2>Mint NFT</h2>
  <select id="nftSelect">
    <option value="1">Beta Tester NFT</option>
    <option value="2">Skater Mouse NFT</option>
    <option value="3">Paid NFT</option>
    <option value="4">Premium NFT</option>
  </select>
  <input type="number" id="quantity" placeholder="Quantity" />
  <button class="button" onclick="mintNFT()">Mint NFT</button>

  <h2>Airdrop NFT</h2>
  <input type="text" id="airdropAddress" placeholder="Wallet Address (0x...)" />
  <select id="airdropSelect">
    <option value="1">Beta Tester NFT</option>
    <option value="2">Skater Mouse NFT</option>
    <option value="3">Paid NFT</option>
    <option value="4">Premium NFT</option>
  </select>
  <button class="button" onclick="airdropNFT()">Send Airdrop</button>

  <h2>Download Beta Tester List</h2>
  <button class="button" onclick="downloadTesters()">Download CSV</button>

  <script>
    const allowedAddress = "0xB7Acf7F61e360baB855A86742be5273baB69B153";
    const contractAddress = "0x06Fe9E5feF1C3F3AeAF4Aa2cCFAB4989B21AB59F";
    const abi = [
      {
        "inputs": [
          { "internalType": "address", "name": "to", "type": "address" },
          { "internalType": "uint256", "name": "id", "type": "uint256" },
          { "internalType": "uint256", "name": "amount", "type": "uint256" }
        ],
        "name": "mint",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
      }
    ];

    let provider, signer, contract;

    async function connectWallet() {
      try {
        if (!window.ethereum) {
          alert("Brave Wallet not detected.");
          return;
        }
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const address = await signer.getAddress();

        if (address.toLowerCase() !== allowedAddress.toLowerCase()) {
          document.body.innerHTML = "<h1 style='color: red;'>Access Denied</h1><p>You are not authorized to use this page.</p>";
          return;
        }

        document.getElementById("walletStatus").innerText = "Wallet Connected: " + address;
        contract = new ethers.Contract(contractAddress, abi, signer);
      } catch (err) {
        alert("Wallet connection failed: " + err.message);
      }
    }

    async function mintNFT() {
      const id = document.getElementById("nftSelect").value;
      const qty = document.getElementById("quantity").value;
      if (!contract || !signer) return alert("Wallet not connected.");
      try {
        const to = await signer.getAddress();
        const tx = await contract.mint(to, id, qty);
        alert("Mint successful! Tx hash: " + tx.hash);
      } catch (err) {
        console.error(err);
        alert("Mint failed: " + err.message);
      }
    }

    async function airdropNFT() {
      const address = document.getElementById("airdropAddress").value;
      const id = document.getElementById("airdropSelect").value;
      if (!contract || !signer) return alert("Wallet not connected.");
      try {
        const tx = await contract.mint(address, id, 1);
        alert("Airdrop sent! Tx hash: " + tx.hash);
      } catch (err) {
        console.error(err);
        alert("Airdrop failed: " + err.message);
      }
    }

    async function downloadTesters() {
      try {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1FGU2A8p8YXMyxGPHxoxuLud0oz5rCHdzJ--_z9o1qF0E6tp_EK0bJ9A0HDnVdx0FCxxghjFrc21U/pub?output=csv";
        const res = await fetch(url);
        const data = await res.text();
        const blob = new Blob([data], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "beta_testers.csv";
        a.click();
      } catch (err) {
        alert("Download failed: " + err.message);
      }
    }
  </script>
</body>
</html>
