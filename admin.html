
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assets Alert Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1, h2 {
            color: #ff3b3b;
        }
        select, input, button {
            background-color: #1e1e1e;
            color: white;
            border: 1px solid gray;
            border-radius: 5px;
            padding: 10px;
            margin: 5px 0;
            font-size: 1rem;
        }
        button {
            background-color: red;
            cursor: pointer;
        }
        .section {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>Assets Alert Admin Dashboard</h1>
    <div id="walletStatus">Wallet Connected: Not connected</div>
    <button onclick="connectWallet()">Connect Wallet</button>

    <div class="section">
        <h2>Mint NFT</h2>
        <select id="mintNftSelect">
            <option>Skater Mouse NFT</option>
            <option>Beta Tester NFT</option>
            <option>Paid NFT</option>
            <option>Premium NFT</option>
            <option>Mystery NFT 1</option>
            <option>Mystery NFT 2</option>
        </select><br>
        <input type="text" id="mintQuantity" placeholder="Quantity"><br>
        <button onclick="mintNFT()">Mint NFT</button>
    </div>

    <div class="section">
        <h2>Airdrop NFT</h2>
        <input type="text" id="airdropAddress" placeholder="Recipient Address"><br>
        <select id="airdropNftSelect">
            <option>Skater Mouse NFT</option>
            <option>Beta Tester NFT</option>
            <option>Paid NFT</option>
            <option>Premium NFT</option>
            <option>Mystery NFT 1</option>
            <option>Mystery NFT 2</option>
        </select><br>
        <input type="text" id="airdropQuantity" placeholder="Quantity"><br>
        <button onclick="airdropNFT()">Airdrop NFT</button>
    </div>

    <div class="section">
        <h2>Beta Tester List</h2>
        <button onclick="window.location.href='beta_testers.csv'">Download Beta Tester CSV</button>
    </div>

    <script>
        let provider;
        let signer;

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();
                    document.getElementById("walletStatus").innerText = "Wallet Connected: " + address;
                } catch (error) {
                    console.error("User rejected connection", error);
                }
            } else {
                alert("No Ethereum provider found. Use Brave, MetaMask or similar.");
            }
        }

        function mintNFT() {
            alert("Minting logic would be implemented here.");
        }

        function airdropNFT() {
            alert("Airdrop logic would be implemented here.");
        }
    </script>
</body>
</html>
