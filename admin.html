
<!DOCTYPE html>
<html>
<head>
  <title>Assets Alert Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 26px;
      padding: 20px;
    }
    select, input, button {
      padding: 10px;
      font-size: 26px;
      margin: 10px 0;
      background-color: #ffeb3b;
      color: black;
      border: 2px solid gray;
      border-radius: 5px;
      height: 48px;
    }
    button {
      background-color: red;
      color: white;
      cursor: pointer;
    }
    .gray-box {
      border: 2px solid gray;
      padding: 20px;
      margin-bottom: 30px;
    }
    iframe {
      border: none;
      width: 100%;
      height: 700px;
    }
    a.view-link {
      color: #00ccff;
      text-decoration: underline;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>

  <div class="gray-box">
    <button id="connectWallet">Connect Wallet</button>
    <p id="walletStatus">Not connected</p>
  </div>

  <div class="gray-box">
    <h2>Mint NFT to My Wallet</h2>
    <label for="mintToken">Select NFT:</label>
    <select id="mintToken">
      <option value="A1">A1 - Skater Mouse (Animated)</option>
      <option value="A2">A2 - Beta Tester NFT</option>
      <option value="A3">A3 - Paid NFT</option>
      <option value="A4">A4 - Premium NFT</option>
      <option value="M1">M1 - Mystery Mouse (3D Glasses)</option>
      <option value="M2">M2 - Mystery Mouse 2 (Miner)</option>
      <option value="S1">S1 - Rapper Mouse</option>
    </select>
    <label for="mintQuantity">Quantity:</label>
    <input type="number" id="mintQuantity" value="1" min="1">
    <button onclick="mintToMe()">Mint</button>
    <p id="mintStatus"></p>
    <p><a id="mintViewLink" class="view-link" href="#" target="_blank" style="display:none;">🔗 View NFT on Polygonscan</a></p>
  </div>

  <div class="gray-box">
    <h2>Airdrop NFT</h2>
    <label for="airdropAddress">Recipient Address:</label>
    <input type="text" id="airdropAddress">
    <label for="airdropToken">Select NFT:</label>
    <select id="airdropToken">
      <option value="A1">A1 - Skater Mouse (Animated)</option>
      <option value="A2">A2 - Beta Tester NFT</option>
      <option value="A3">A3 - Paid NFT</option>
      <option value="A4">A4 - Premium NFT</option>
      <option value="M1">M1 - Mystery Mouse (3D Glasses)</option>
      <option value="M2">M2 - Mystery Mouse 2 (Miner)</option>
      <option value="S1">S1 - Rapper Mouse</option>
    </select>
    <label for="airdropQuantity">Quantity:</label>
    <input type="number" id="airdropQuantity" value="1" min="1">
    <button onclick="airdropNFT()">Airdrop</button>
    <p id="airdropStatus"></p>
  </div>

  <div class="gray-box">
    <h2>Beta Tester Sign-Up Form</h2>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc1otkufkAHUCxd_NQ97j97KDpAtdZk3DV_EX40eRYW75jb4A/viewform?embedded=true" loading="lazy">Loading…</iframe>
  </div>

  <div class="gray-box">
    <h2>View NFTs on OpenSea</h2>
    <a href="https://opensea.io/assets/matic/0xCdb25eb86266cAA0C175144eF4FB241A2F79390E" target="_blank" class="view-link">🔗 View All NFTs</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
  <script>
    const contractAddress = "0xCdb25eb86266cAA0C175144eF4FB241A2F79390E";
    const tokenIds = { A1: 1, A2: 2, A3: 3, A4: 4, M1: 5, M2: 6, S1: 7 };
    const abi = [
      { "inputs": [{ "internalType": "uint256", "name": "id", "type": "uint256" }, { "internalType": "uint256", "name": "amount", "type": "uint256" }], "name": "mint", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
      { "inputs": [{ "internalType": "address", "name": "to", "type": "address" }, { "internalType": "uint256", "name": "id", "type": "uint256" }, { "internalType": "uint256", "name": "amount", "type": "uint256" }], "name": "airdrop", "outputs": [], "stateMutability": "nonpayable", "type": "function" }
    ];
    let web3, accounts, contract;

    async function connectWallet() {
      if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: "eth_requestAccounts" });
        await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x89" }] });
        accounts = await web3.eth.getAccounts();
      } else {
        const provider = new WalletConnectProvider.default({ rpc: { 137: "https://polygon-rpc.com" }, chainId: 137 });
        await provider.enable();
        web3 = new Web3(provider);
        accounts = await web3.eth.getAccounts();
      }
      contract = new web3.eth.Contract(abi, contractAddress);
      document.getElementById("walletStatus").innerText = "Connected: " + accounts[0];
    }

    document.getElementById("connectWallet").onclick = connectWallet;

    async function mintToMe() {
      const tokenCode = document.getElementById("mintToken").value;
      const tokenId = tokenIds[tokenCode];
      const amount = parseInt(document.getElementById("mintQuantity").value);
      try {
        await contract.methods.mint(tokenId, amount).send({ from: accounts[0] });
        document.getElementById("mintStatus").innerText = "✅ Mint successful!";
        const viewURL = `https://polygonscan.com/token/${contractAddress}?a=${tokenId}`;
        const link = document.getElementById("mintViewLink");
        link.href = viewURL;
        link.style.display = "inline";
      } catch (err) {
        console.error(err);
        document.getElementById("mintStatus").innerText = "❌ Mint failed.";
      }
    }

    async function airdropNFT() {
      const to = document.getElementById("airdropAddress").value;
      const tokenCode = document.getElementById("airdropToken").value;
      const tokenId = tokenIds[tokenCode];
      const amount = parseInt(document.getElementById("airdropQuantity").value);
      try {
        await contract.methods.airdrop(to, tokenId, amount).send({ from: accounts[0] });
        document.getElementById("airdropStatus").innerText = "✅ Airdrop successful!";
      } catch (err) {
        console.error(err);
        document.getElementById("airdropStatus").innerText = "❌ Airdrop failed.";
      }
    }
  </script>
</body>
</html>
