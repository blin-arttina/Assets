
<!DOCTYPE html>
<html>
<head>
  <title>Assets Alert Admin</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      font-size: 26px;
    }
    select, input, button {
      padding: 10px;
      font-size: 26px;
      margin: 10px 0;
      background-color: #ffeb3b;
      color: black;
      border: 2px solid gray;
      border-radius: 5px;
      height: 48px;
    }
    button {
      background-color: red;
      color: white;
      cursor: pointer;
    }
    .section {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>
  <div class="section">
    <label for="nftDropdown">Select NFT to Mint:</label>
    <select id="nftDropdown">
      <option value="A1">A1 - Skater Mouse (Animated)</option>
<option value="A2">A2 - Beta Tester</option>
<option value="A3">A3 - Paid NFT</option>
<option value="A4">A4 - Premium NFT</option>
<option value="M1">M1 - Mystery NFT (3D Glasses Mouse)</option>
<option value="M2">M2 - Minor Mouse</option>
<option value="S1">S1 - Rapper Mouse</option>
    </select>
    <label for="mintQuantity">Quantity:</label>
    <input type="number" id="mintQuantity" value="1" min="1">
    <button onclick="mintNFT()">Mint NFT</button>
    <p id="mintStatus"></p>
  </div>

  <script>
    function mintNFT() {
      const nftId = document.getElementById("nftDropdown").value;
      const quantity = document.getElementById("mintQuantity").value;
      document.getElementById("mintStatus").innerText = `Minted {quantity} of NFT ID: {nftId}`;
    }
  </script>
</body>
</html>
