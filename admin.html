<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Blind_Art Admin — Full Page v7 (Verbose)</title>
<style>
  body{background:black;color:white;font-family:Arial;padding:20px}
  h1{font-size:26px}
  button{background:red;color:white;border:none;border-radius:12px;padding:10px 16px;margin:5px;font-size:18px}
  input,select,textarea{background:#111;border:1px solid #333;color:white;border-radius:10px;padding:8px;width:100%}
  #log{background:#050505;border:1px solid #333;border-radius:10px;padding:10px;margin-top:10px;white-space:pre-wrap;min-height:120px;font-family:monospace;color:#0f0}
</style>
</head>
<body>
  <h1>Blind_Art Admin (Verbose v7)</h1>
  <p>Contract: <span id="contractAddr">0xCdb25eb86266cAA0C175144eF4FB241A2F79390E</span> • Chain 137 (Polygon)</p>

  <div>
    <button onclick="connectInjected('Auto')">Auto‑Connect (Injected)</button>
    <button onclick="connectInjected('Brave')">Connect Brave</button>
    <button onclick="connectInjected('Trust')">Connect Trust</button>
    <button onclick="connectInjected('Base')">Connect Base</button>
  </div>

  <div>
    <label>RPC URL</label>
    <input id="rpc" value="https://polygon-rpc.com"/>
    <button onclick="testRpc()">Test RPC</button>
    <span id="rpcStatus">—</span>
  </div>

  <div>
    <label>Brave wallet</label>
    <input id="addrBrave" value="0xB7Acf7F61e360baB855A86742be5273baB69B153"/>
    <label>Trust wallet</label>
    <input id="addrTrust" value="0x6502663d6d6ce0496abC0e6D8B5d8E79F7160E2E"/>
    <button onclick="document.getElementById('to').value=document.getElementById('addrBrave').value">Use Brave</button>
    <button onclick="document.getElementById('to').value=document.getElementById('addrTrust').value">Use Trust</button>
  </div>

  <div>
    <label>To address</label><input id="to"/>
    <label>NFT ID</label>
    <select id="tokenId">
      <option value="1">A1</option>
      <option value="2">A2</option>
      <option value="3">8384</option>
      <option value="4">M1</option>
      <option value="5">M2</option>
      <option value="6">S1</option>
      <option value="7">S2</option>
    </select>
    <label>Qty</label><input id="qty" type="number" value="1"/>
    <button onclick="doMint()">Mint</button>
  </div>

  <h2>Diagnostics</h2>
  <button onclick="downloadLog()">Download Diagnostics</button>
  <button onclick="copyLog()">Copy Diagnostics</button>
  <div id="log">Starting up…</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script>
let logBuf=""; function log(m){const t=new Date().toLocaleTimeString(); logBuf+="["+t+"] "+m+"\n"; document.getElementById('log').textContent=logBuf;}
let signer; const contractAddr=document.getElementById('contractAddr').textContent.trim();
const abi=["function mint(address to,uint256 id,uint256 amount,bytes data) public"];
function getRpc(){return document.getElementById('rpc').value.trim();}
async function testRpc(){try{const r=await fetch(getRpc(),{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:"2.0",id:1,method:"eth_chainId",params:[]})}); const j=await r.json(); if(j.result){document.getElementById('rpcStatus').textContent="OK "+parseInt(j.result,16); log("RPC OK "+j.result);} else throw new Error(j.error.message);}catch(e){document.getElementById('rpcStatus').textContent="Error"; log("RPC error: "+e.message);}}
async function connectInjected(label){if(!window.ethereum){log("No wallet injected");return;} try{await window.ethereum.request({method:"eth_requestAccounts"}); const prov=new ethers.providers.Web3Provider(window.ethereum); signer=prov.getSigner(); const addr=await signer.getAddress(); log("Connected ("+label+"): "+addr);}catch(e){log("Connect error: "+e.message);}}
async function doMint(){try{if(!signer){log("No signer, connect first.");return;} const to=document.getElementById('to').value.trim(); const id=parseInt(document.getElementById('tokenId').value,10); const qty=parseInt(document.getElementById('qty').value,10); const c=new ethers.Contract(contractAddr,abi,signer); log("Minting "+qty+" of "+id+" to "+to); const tx=await c.mint(to,id,qty,"0x"); log("Tx hash "+tx.hash); const rc=await tx.wait(); log("Confirmed block "+rc.blockNumber);}catch(e){log("Mint error: "+(e.message||e));}}
function downloadLog(){const blob=new Blob([logBuf],{type:"text/plain"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="diagnostics.txt"; a.click();}
async function copyLog(){try{await navigator.clipboard.writeText(logBuf); log("Diagnostics copied");}catch(e){log("Copy failed: "+e.message);}}
log("Page loaded, RPC="+getRpc());
</script>
</body>
</html>
