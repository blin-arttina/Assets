<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Blind_Art Admin — Full Page v6</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<style>
  :root{--bg:#000;--fg:#fff;--accent:#e22;--muted:#999;--ok:#0f0;--warn:#ffb300;--bad:#ff4d4d;}
  html,body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{padding:20px;line-height:1.45}
  h1,h2,h3{margin:0 0 12px}
  h1{font-size:26px}
  h2{font-size:22px;margin-top:18px}
  p, label, input, select, textarea{font-size:18px}
  .card{border:1px solid #222;border-radius:14px;padding:14px;margin:14px 0;background:#0a0a0a}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:14px;padding:10px 16px;font-size:18px;cursor:pointer}
  .btn.outline{background:transparent;border:2px solid var(--accent)}
  .btn.ghost{background:#111}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  input,select,textarea{background:#111;border:1px solid #333;border-radius:12px;color:#fff;padding:10px 12px}
  .pill{display:inline-block;background:#111;border:1px solid #222;border-radius:999px;padding:6px 10px;font-size:16px}
  .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
  #log{white-space:pre-wrap;background:#0b0b0b;border-radius:12px;padding:12px;color:#0f0;min-height:140px}
  .status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;background:#444}
  .ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
</style>
</head>
<body>
  <h1>Blind_Art Admin (Full)</h1>
  <p class="mono">Contract: <span id="contractAddr">0xCdb25eb86266cAA0C175144eF4FB241A2F79390E</span> • Chain: <span id="chain">137</span> (Polygon)</p>

  <div class="card">
    <h2>Wallet</h2>
    <div class="row">
      <button class="btn" id="btnAuto">Auto‑Connect (Injected)</button>
      <button class="btn outline" id="btnBrave">Connect Brave</button>
      <button class="btn outline" id="btnTrust">Connect Trust (Injected/WalletConnect)</button>
      <button class="btn outline" id="btnBase">Connect Base (WalletConnect)</button>
      <span class="pill mono" id="acctPill">Not connected</span>
    </div>
  </div>

  <div class="card">
    <h2>RPC (Polygon)</h2>
    <div class="grid">
      <div><label>Default RPC (no key)</label><input id="rpc" value="https://polygon-rpc.com" style="width:100%"/></div>
      <div><label>Fallbacks</label>
        <select id="rpcPreset" style="width:100%">
          <option value="">Choose fallback…</option>
          <option>https://polygon-rpc.com</option>
          <option>https://rpc-mainnet.matic.quiknode.pro</option>
          <option>https://polygon.llamarpc.com</option>
          <option>https://1rpc.io/matic</option>
        </select>
      </div>
    </div>
    <div class="row">
      <span class="pill">RPC status: <span id="rpcStatus">—</span></span>
      <button class="btn ghost" id="btnPing">Test RPC</button>
    </div>
  </div>

  <div class="card">
    <h2>Saved addresses</h2>
    <div class="row">
      <button class="btn ghost" id="useBrave">Use Brave</button>
      <button class="btn ghost" id="useTrust">Use Trust</button>
    </div>
    <div class="grid">
      <div><label>Brave wallet</label><input id="addrBrave" value="0xB7Acf7F61e360baB855A86742be5273baB69B153" style="width:100%"/></div>
      <div><label>Trust wallet</label><input id="addrTrust" value="0x6502663d6d6ce0496abC0e6D8B5d8E79F7160E2E" style="width:100%"/></div>
    </div>
  </div>

  <div class="card">
    <h2>Mint</h2>
    <div class="grid">
      <div><label>To address</label><input id="to" placeholder="0x…" style="width:100%"/></div>
      <div><label>NFT ID</label>
        <select id="tokenId" style="width:100%">
          <option value="1">A1 (animated)</option>
          <option value="2">A2</option>
          <option value="3">8384</option>
          <option value="4">M1</option>
          <option value="5">M2</option>
          <option value="6">S1</option>
          <option value="7">S2</option>
        </select>
      </div>
      <div><label>Quantity</label><input id="qty" type="number" min="1" value="1" style="width:100%"/></div>
    </div>
    <div class="row">
      <button class="btn" id="btnMint">Mint</button>
      <button class="btn ghost" id="btnEstimate">Estimate Gas</button>
      <button class="btn ghost" id="btnCancel" disabled>Cancel Pending</button>
    </div>
  </div>

  <div class="card">
    <h2>Batch & Airdrop</h2>
    <p>Paste one address per line. Optional `<space> qty` after each address. Uses NFT ID above.</p>
    <textarea id="airdropList" rows="6" style="width:100%" placeholder="0x1234...abcd 1&#10;0x5678...ef90 2"></textarea>
    <div class="row">
      <button class="btn" id="btnAirdrop">Airdrop</button>
      <button class="btn ghost" id="btnMintBatch">Mint Batch (same recipient)</button>
    </div>
  </div>

  <div class="card">
    <h2>Diagnostics</h2>
    <div class="row"><button class="btn ghost" id="btnDownload">Download Diagnostics</button></div>
    <div id="log" class="mono">Ready.</div>
  </div>

  <!-- Ethers.js (v5) -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<script>
(function(){
  const logEl = document.getElementById('log');
  const acctPill = document.getElementById('acctPill');
  const rpcInput = document.getElementById('rpc');
  const rpcPreset = document.getElementById('rpcPreset');
  const statusEl = document.getElementById('rpcStatus');
  const contractAddr = document.getElementById('contractAddr').innerText.trim();
  const chainIdTarget = 137; // Polygon

  const braveAddr = document.getElementById('addrBrave');
  const trustAddr = document.getElementById('addrTrust');

  const inputs = {
    to: document.getElementById('to'),
    tokenId: document.getElementById('tokenId'),
    qty: document.getElementById('qty'),
    airdropList: document.getElementById('airdropList'),
  };

  let provider, signer, lastTx;

  const abi = [
    "function mint(address to, uint256 id, uint256 amount, bytes data) public",
    "function mintBatch(address to, uint256[] ids, uint256[] amounts, bytes data) public",
    "function supportsInterface(bytes4 interfaceId) public view returns (bool)"
  ];

  function log(msg){
    const t = new Date().toLocaleTimeString();
    logEl.textContent += `\n[${t}] ${msg}`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setAcct(addr){
    acctPill.textContent = addr ? ("Connected: " + addr) : "Not connected";
  }

  function getRpc(){
    return rpcInput.value.trim() || "https://polygon-rpc.com";
  }

  async function makeJsonRpc(method, params=[]){
    const res = await fetch(getRpc(), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({jsonrpc:"2.0", id:1, method, params})
    });
    if(!res.ok){ throw new Error("RPC HTTP " + res.status); }
    const j = await res.json();
    if(j.error){ throw new Error(j.error.message || "RPC error"); }
    return j.result;
  }

  async function testRpc(){
    try{
      statusEl.textContent = "Pinging…";
      await makeJsonRpc("eth_chainId", []);
      statusEl.textContent = "OK";
      log("RPC OK: " + getRpc());
    }catch(e){
      statusEl.textContent = "Error";
      log("RPC error: " + e.message);
    }
  }

  rpcPreset.addEventListener('change', ()=>{
    if(rpcPreset.value) rpcInput.value = rpcPreset.value;
    testRpc();
  });

  document.getElementById('btnPing').addEventListener('click', testRpc);
  testRpc();

  async function ensureChain(){
    if(!window.ethereum) return;
    try{
      const hex137 = "0x89";
      const cur = await window.ethereum.request({method:"eth_chainId"});
      if(cur !== hex137){
        log("Requesting switch to Polygon (137)…");
        await window.ethereum.request({method:"wallet_switchEthereumChain", params:[{chainId: hex137}]});
        log("Switched to Polygon.");
      }
    }catch(e){
      log("Switch chain failed (continue if provider is set via RPC): " + e.message);
    }
  }

  async function connectInjected(){
    if(!window.ethereum){ log("No injected wallet found."); return; }
    await ensureChain();
    await window.ethereum.request({method:"eth_requestAccounts"});
    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    signer = provider.getSigner();
    const addr = await signer.getAddress();
    setAcct(addr);
    log("Connected injected wallet: " + addr);
  }

  document.getElementById('btnAuto').addEventListener('click', connectInjected);
  document.getElementById('btnBrave').addEventListener('click', connectInjected);
  document.getElementById('btnTrust').addEventListener('click', connectInjected);
  document.getElementById('btnBase').addEventListener('click', connectInjected);

  document.getElementById('useBrave').addEventListener('click', ()=> inputs.to.value = braveAddr.value.trim());
  document.getElementById('useTrust').addEventListener('click', ()=> inputs.to.value = trustAddr.value.trim());

  function getReadWrite(){
    const jsonRpc = new ethers.providers.JsonRpcProvider(getRpc(), { name: "matic", chainId: 137 });
    const contract = new ethers.Contract(contractAddr, abi, signer || jsonRpc);
    return {contract};
  }

  async function estimateGasMint(to, id, qty){
    const {contract} = getReadWrite();
    try{
      const gas = await contract.estimateGas.mint(to, id, qty, "0x");
      log("Estimated gas (mint): " + gas.toString());
    }catch(e){
      log("Gas estimate failed: " + (e.data?.message || e.message));
    }
  }

  async function doMint(){
    try{
      if(!signer){ await connectInjected(); if(!signer) throw new Error("Wallet not connected"); }
      const to = inputs.to.value.trim();
      const id = parseInt(inputs.tokenId.value,10);
      const qty = parseInt(inputs.qty.value,10);
      const {contract} = getReadWrite();
      log(`Submitting mint (id=${id}, qty=${qty}, to=${to})…`);
      const tx = await contract.mint(to, id, qty, "0x");
      lastTx = tx.hash;
      log("Tx sent: " + tx.hash + " — opening in Polygonscan…");
      window.open("https://polygonscan.com/tx/" + tx.hash, "_blank");
      const rec = await tx.wait();
      log("✅ Mint mined in block " + rec.blockNumber);
    }catch(e){
      log("❌ Mint error: " + (e.data?.message || e.message));
    }
  }

  async function doMintBatch(){
    try{
      if(!signer){ await connectInjected(); if(!signer) throw new Error("Wallet not connected"); }
      const to = inputs.to.value.trim();
      const id = parseInt(inputs.tokenId.value,10);
      const qty = parseInt(inputs.qty.value,10);
      const ids = Array(qty).fill(id);
      const amts = Array(qty).fill(1);
      const {contract} = getReadWrite();
      log(`Submitting mintBatch (to=${to}, count=${qty})…`);
      const tx = await contract.mintBatch(to, ids, amts, "0x");
      lastTx = tx.hash;
      log("Tx sent: " + tx.hash);
      const rec = await tx.wait();
      log("✅ mintBatch mined in block " + rec.blockNumber);
    }catch(e){
      log("❌ mintBatch error: " + (e.data?.message || e.message));
    }
  }

  async function doAirdrop(){
    try{
      if(!signer){ await connectInjected(); if(!signer) throw new Error("Wallet not connected"); }
      const id = parseInt(inputs.tokenId.value,10);
      const lines = inputs.airdropList.value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
      if(!lines.length){ log("No addresses supplied."); return; }
      for(const line of lines){
        const parts = line.split(/\s+/);
        const addr = parts[0];
        const qty = parseInt(parts[1]||"1",10);
        const {contract} = getReadWrite();
        log(`Airdrop → ${addr} x${qty}`);
        const tx = await contract.mint(addr, id, qty, "0x");
        lastTx = tx.hash;
        await tx.wait();
        log("✅ Airdropped to " + addr);
      }
      log("Airdrop complete.");
    }catch(e){
      log("❌ Airdrop error: " + (e.data?.message || e.message));
    }
  }

  async function cancelPending(){
    if(!lastTx){ log("No pending tx to cancel."); return; }
    window.open("https://polygonscan.com/tx/" + lastTx, "_blank");
  }

  document.getElementById('btnEstimate').addEventListener('click', ()=>{
    const to = inputs.to.value.trim();
    const id = parseInt(inputs.tokenId.value,10);
    const qty = parseInt(inputs.qty.value,10);
    estimateGasMint(to,id,qty);
  });
  document.getElementById('btnMint').addEventListener('click', doMint);
  document.getElementById('btnMintBatch').addEventListener('click', doMintBatch);
  document.getElementById('btnAirdrop').addEventListener('click', doAirdrop);
  document.getElementById('btnCancel').addEventListener('click', cancelPending);

  document.getElementById('btnDownload').addEventListener('click', ()=>{
    const blob = new Blob([logEl.textContent], {type:"text/plain"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = "diagnostics.txt"; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  });

  // Initial RPC test
  log("Using RPC: " + getRpc());
  testRpc();

  // Attempt silent connect in Brave/Trust in-app
  if (window.ethereum){
    window.ethereum.request({method:"eth_accounts"}).then(acc=>{
      if(acc && acc[0]){ connectInjected(); }
    }).catch(()=>{});
  }
})();
</script>
</body>
</html>
