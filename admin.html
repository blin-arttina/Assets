
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin Dashboard</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      padding: 2em;
    }
    h1 {
      font-size: 2em;
    }
    h2 {
      margin-top: 1.5em;
    }
    .beta-tester {
      margin-top: 1em;
      padding: 1em;
      border: 1px solid white;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Assets Alert Admin Dashboard</h1>
  <h2>Beta Tester Sign-Ups</h2>
  <div id="beta-tester-list">Loading...</div>

  <script>
    async function fetchBetaTesters() {
      try {
        const response = await fetch("https://secure-signup-server.onrender.com/getBetaTesters");
        if (!response.ok) throw new Error("Network response was not ok");
        const testers = await response.json();
        const container = document.getElementById("beta-tester-list");

        if (testers.length === 0) {
          container.textContent = "No beta testers yet.";
        } else {
          container.innerHTML = testers.map(t =>
            `<div class="beta-tester">
              <strong>Name:</strong> ${t.name}<br/>
              <strong>Email:</strong> ${t.email}<br/>
              <strong>Wallet:</strong> ${t.wallet}
            </div>`).join('');
        }
      } catch (error) {
        document.getElementById("beta-tester-list").textContent = "Error loading beta testers.";
        console.error("Fetch error:", error);
      }
    }

    fetchBetaTesters();
  </script>
</body>
</html>
