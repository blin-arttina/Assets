
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assets Alert Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1, h2 {
      color: #ff4c4c;
    }
    .button {
      background-color: #ff4c4c;
      color: white;
      border: 1px solid gray;
      padding: 10px 20px;
      margin: 10px 0;
      cursor: pointer;
    }
    .section {
      border: 1px solid gray;
      padding: 20px;
      margin-bottom: 30px;
    }
    textarea {
      width: 100%;
      height: 150px;
      background-color: #1e1e1e;
      color: white;
      border: 1px solid gray;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h1>Assets Alert Admin Dashboard</h1>

  <!-- Wallet Connection -->
  <div class="section">
    <h2>Minting & Airdrop Tools</h2>
    <button class="button" onclick="connectBraveWallet()">🔌 Connect Brave Wallet</button>
    <p id="wallet-address">No wallet connected</p>
  </div>

  <!-- Beta Tester Email List -->
  <div class="section">
    <h2>Beta Tester Emails for Welcome Message</h2>
    <textarea id="emailList" readonly>Loading emails...</textarea>
    <button class="button" onclick="copyEmails()">📋 Copy All Emails</button>
  </div>

  <!-- Airdrop Panel -->
  <div class="section">
    <h2>Wallets Eligible for Airdrop</h2>
    <div id="airdropList">Loading wallet addresses...</div>
  </div>

  <!-- Purchase Log -->
  <div class="section">
    <h2>Purchase Tracker (Mint Events)</h2>
    <div id="purchaseLogs">Loading contract logs...</div>
  </div>

  <script>
    async function connectBraveWallet() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          const userWallet = accounts[0];
          document.getElementById("wallet-address").innerText = "Connected: " + userWallet;
        } catch (error) {
          console.error("Access denied or error:", error);
        }
      } else {
        alert("Please install Brave Wallet or MetaMask.");
      }
    }

    function copyEmails() {
      const emailBox = document.getElementById("emailList");
      emailBox.select();
      document.execCommand("copy");
      alert("Emails copied!");
    }

    // Placeholder content
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("emailList").value = "example1@email.com\nexample2@email.com";
      document.getElementById("airdropList").innerHTML = `
        <p>0xExampleWallet1 <button class='button'>Airdrop</button></p>
        <p>0xExampleWallet2 <button class='button'>Airdrop</button></p>
      `;
      document.getElementById("purchaseLogs").innerHTML = `
        <p>Buyer: 0xABC123... | NFT ID: 1 | Qty: 1 | Time: 10:03 AM</p>
        <p>Buyer: 0xDEF456... | NFT ID: 3 | Qty: 2 | Time: 10:10 AM</p>
      `;
    });
  </script>

</body>
</html>
